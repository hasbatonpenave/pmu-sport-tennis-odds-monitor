<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMU SPORT — Live Odds</title>
<style>
  :root {
    --bg:       #060a0f;
    --bg2:      #0c1420;
    --bg3:      #111d2e;
    --border:   #1a2e45;
    --accent:   #00d4aa;
    --text:     #8ab4d4;
    --text-hi:  #cde4f7;
    --green:    #00e676;
    --red:      #ff4f4f;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Fira Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px; min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a4060; border-radius: 3px; }

  /* topbar */
  .topbar {
    position: sticky; top: 0; z-index: 100; flex-shrink: 0;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .logo { color: var(--accent); font-weight: 700; font-size: 13px; letter-spacing: 0.07em; white-space: nowrap; }
  .logo span { color: var(--text); font-weight: 400; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .dot.err  { background: var(--red); }
  .dot.off  { background: #3a6080; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .status-txt { font-size: 11px; color: var(--text); }
  .ctrl {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 4px; font: 11px 'Fira Mono','Cascadia Code','Consolas',monospace;
    outline: none;
  }
  .ctrl:focus, .ctrl:hover { border-color: var(--accent); }
  .url-input { flex: 1; min-width: 200px; }
  .stats { display: flex; gap: 16px; font-size: 11px; color: var(--text); margin-left: auto; white-space: nowrap; }

  /* toolbar */
  .toolbar {
    position: sticky; top: 42px; z-index: 99; flex-shrink: 0;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 8px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .toolbar .ctrl { flex: 1; min-width: 180px; }
  .pill {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 4px; font: 11px 'Fira Mono','Cascadia Code','Consolas',monospace;
    cursor: pointer; transition: border-color .15s, background .12s;
  }
  .pill:hover { border-color: var(--accent); }
  .pill.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,.06); }
  .match-count { font-size: 11px; color: var(--text); white-space: nowrap; }

  /* grid */
  .grid {
    flex: 1; overflow-y: auto; padding: 10px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
    gap: 8px; align-content: start;
  }
  .card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px 5px; transition: border-color .15s;
  }
  .card:hover { border-color: #2a4060; }
  .card.live { border-left: 3px solid var(--red); }

  .card-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .card-name { font-weight: 700; color: var(--text-hi); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .live-badge { background: var(--red); color: #000; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
  .sport-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
  .sport-badge.tennis { background: var(--accent); color: #000; }
  .sport-badge.football { background: #4a90d9; color: #fff; }
  .card-info { font-size: 10px; color: #3a6080; margin-bottom: 6px; }
  .card-score { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-weight: 600; }

  /* odds row */
  .odds-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--border); border-radius: 4px; overflow: hidden;
  }
  .odds-cell {
    background: var(--bg3); padding: 6px; position: relative;
    display: flex; flex-direction: column;
  }
  .odds-label { font-size: 9px; text-transform: uppercase; color: #3a6080; margin-bottom: 2px; letter-spacing: 0.03em; }
  .odds-val { font-size: 16px; font-weight: 700; color: var(--text-hi); transition: color .1s; }
  .odds-raw { font-size: 10px; color: #3a6080; }
  .trend { font-size: 10px; margin-left: 3px; }
  .trend.up { color: var(--green); }
  .trend.down { color: var(--red); }

  /* flash overlays */
  .flash-up, .flash-down {
    position: absolute; inset: 0; pointer-events: none; border-radius: 4px; opacity: 0;
  }
  .flash-up   { background: rgba(0,230,118,.18); }
  .flash-down { background: rgba(255,79,79,.18); }
  .flashing-up   .flash-up   { animation: flash-anim .6s ease-out; }
  .flashing-down .flash-down { animation: flash-anim .6s ease-out; }
  @keyframes flash-anim { 0%{opacity:1} 100%{opacity:0} }

  .card-foot { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: #2a4060; }

  .empty { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #3a6080; font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">PMU<span> / Live Odds</span></div>
  <div class="dot off" id="dot"></div>
  <span class="status-txt" id="statusTxt">connecting...</span>
  <input class="ctrl url-input" id="url" value="http://localhost:5500" placeholder="API URL">
  <button class="ctrl" id="connectBtn" onclick="connect()" style="cursor:pointer">Connect</button>
  <div class="stats" id="topStats"></div>
</div>

<div class="toolbar">
  <input class="ctrl" id="search" placeholder="Search player, team, or tournament..." oninput="applyFilters()">
  <button class="pill active" data-filter="all"     onclick="setFilter('all',this)">All</button>
  <button class="pill"        data-filter="TENNIS"   onclick="setFilter('TENNIS',this)">Tennis</button>
  <button class="pill"        data-filter="FOOTBALL" onclick="setFilter('FOOTBALL',this)">Football</button>
  <button class="pill"        data-filter="moneyline" onclick="setFilter('moneyline',this)">Match Odds</button>
  <button class="pill"        data-filter="handicap"  onclick="setFilter('handicap',this)">Hcp</button>
  <button class="pill"        data-filter="totals"    onclick="setFilter('totals',this)">Totals</button>
  <span class="match-count" id="matchCount"></span>
</div>

<div class="grid" id="grid"><div class="empty" id="empty">Waiting for data...</div></div>

<script>
const API = () => document.getElementById('url').value.trim();
let es = null;
let matchState = {};
let _retry = 1000;
let activeFilter = 'all';
let _statsPoll = null;

function $(id) { return document.getElementById(id); }

function setStatus(live) {
  const d = $('dot'), t = $('statusTxt');
  d.className = 'dot ' + (live === true ? 'live' : live === false ? 'err' : 'off');
  t.textContent = live === true ? 'LIVE' : live === false ? 'ERR — retrying' : 'connecting...';
}

function timeAgo(ts) {
  const d = (Date.now()/1000) - ts;
  if (d < 5) return 'just now';
  if (d < 60) return Math.floor(d) + 's ago';
  return Math.floor(d/60) + 'm ago';
}

function applyFilters() {
  const q = ($('search').value || '').toLowerCase();
  const sportFilters = ['TENNIS', 'FOOTBALL'];
  const isSport = sportFilters.includes(activeFilter);
  let vis = 0;
  document.querySelectorAll('.card').forEach(c => {
    const textOk = !q || (c.dataset.matchname||'').includes(q) || (c.dataset.players||'').includes(q)
                      || (c.dataset.series||'').includes(q);
    const sportOk = !isSport || c.dataset.sport === activeFilter;
    const mktOk = isSport || activeFilter === 'all' || c.dataset.markets?.includes(activeFilter);
    const ok = textOk && sportOk && mktOk;
    c.style.display = ok ? '' : 'none';
    if (ok) vis++;
  });
  $('matchCount').textContent = vis + ' matches';
  $('empty').style.display = (vis === 0 && Object.keys(matchState).length > 0) ? '' : 'none';
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function flashCell(cell, dir) {
  cell.classList.remove('flashing-up', 'flashing-down');
  void cell.offsetWidth;
  cell.classList.add(dir === 'up' ? 'flashing-up' : 'flashing-down');
  setTimeout(() => cell.classList.remove('flashing-up', 'flashing-down'), 700);
}

function ensureCard(mid, m) {
  if ($('c_' + mid)) return;
  $('empty').style.display = 'none';
  const mkt = m.prices || {};
  const sport = m.meta?.sport || '';
  const mkts = Object.keys(mkt).map(k =>
    k.toLowerCase().includes('match odds') || k.toLowerCase().includes('full time') ? 'moneyline'
    : k.toLowerCase().includes('handicap') ? 'handicap'
    : k.toLowerCase().includes('total') || k.toLowerCase().includes('over') ? 'totals' : k).join(' ');

  const players = (m.meta?.player_a||'') + ' ' + (m.meta?.player_b||'');
  const live = m.meta?.state === 'STARTED' || m.meta?.live;
  const score = m.score;

  let scoreHTML = '';
  if (live && score) {
    const sh = score.sets_home || [], sa = score.sets_away || [];
    let sets = '';
    for (let i = 0; i < Math.max(sh.length, sa.length); i++) {
      const h = sh[i] !== undefined && sh[i] >= 0 ? sh[i] : '-';
      const a = sa[i] !== undefined && sa[i] >= 0 ? sa[i] : '-';
      sets += h + '-' + a + ' ';
    }
    const serve = score.home_serve ? ' • serve' : '';
    scoreHTML = '<div class="card-score">' + sets.trim() + ' | game ' + (score.home||0) + '-' + (score.away||0) + serve + '</div>';
  }

  let rows = '';
  for (const [mkt, odds] of Object.entries(mkt)) {
    const entries = Object.entries(odds);
    rows += '<div class="odds-row">';
    for (const [sel, odd] of entries) {
      const selShort = sel.length > 18 ? sel.slice(0,16)+'…' : sel;
      rows += '<div class="odds-cell" data-mkt="'+mkt+'" data-sel="'+sel+'">'
        + '<div class="flash-up"></div><div class="flash-down"></div>'
        + '<div class="odds-label">'+selShort+'</div>'
        + '<div class="odds-val">'+odd.toFixed(2)+'</div>'
        + '<div class="odds-raw">dec: '+odd.toFixed(2)+'</div>'
        + '</div>';
    }
    rows += '</div>';
  }

  const div = document.createElement('div');
  div.id = 'c_' + mid;
  div.className = 'card' + (live ? ' live' : '');
  div.dataset.matchname = (m.meta?.name||'').toLowerCase();
  div.dataset.players = players.toLowerCase();
  div.dataset.series = (m.meta?.competition||'').toLowerCase();
  div.dataset.markets = mkts;
  div.dataset.sport = sport;
  const sportBadge = sport === 'TENNIS' ? '<div class="sport-badge tennis">T</div>'
    : sport === 'FOOTBALL' ? '<div class="sport-badge football">F</div>' : '';
  div.innerHTML =
    '<div class="card-hdr">'
    + '<div class="card-name">' + (m.meta?.player_a||'?') + ' vs ' + (m.meta?.player_b||'?') + '</div>'
    + (live ? '<div class="live-badge">LIVE</div>' : '')
    + sportBadge
    + '</div>'
    + '<div class="card-info">' + (m.meta?.competition||'') + ' · ' + (m.meta?.start_time ? new Date(m.meta.start_time).toLocaleString() : 'TBD') + '</div>'
    + scoreHTML
    + rows
    + '<div class="card-foot"><span>#' + mid + '</span><span class="age" data-ts="' + (m.ts||0) + '"></span></div>';
  $('grid').appendChild(div);
}

function updateCard(mid, mkt, odds, movements) {
  const card = $('c_' + mid);
  if (!card) return;
  for (const [sel, odd] of Object.entries(odds)) {
    const cell = card.querySelector('.odds-cell[data-mkt="'+mkt+'"][data-sel="'+sel+'"]');
    if (!cell) continue;
    const prev = parseFloat(cell.querySelector('.odds-val')?.textContent || '0');
    const dir = movements?.[sel] || (odd > prev ? 'up' : odd < prev ? 'down' : null);
    cell.querySelector('.odds-val').innerHTML = odd.toFixed(2)
      + (dir ? '<span class="trend '+(dir==='up'?'up':'down')+'">'+(dir==='up'?'▲':'▼')+'</span>' : '');
    cell.querySelector('.odds-raw').textContent = 'dec: ' + odd.toFixed(2);
    if (dir) flashCell(cell, dir);
  }
  const age = card.querySelector('.age');
  if (age) { age.dataset.ts = Date.now()/1000; age.textContent = timeAgo(Date.now()/1000); }
}

function onSSEMessage(e) {
  if (!e.data) return;
  try { const d = JSON.parse(e.data);
    if (d.type === 'snapshot') {
      for (const [mid, mkts] of Object.entries(d.prices||{})) {
        if (!matchState[mid]) matchState[mid] = { prices: {}, meta: null, score: null, ts: d.ts };
        Object.assign(matchState[mid].prices, mkts);
        matchState[mid].ts = d.ts;
      }
      rebuildAll();
      setStatus(true); _retry = 1000;
    } else if (d.type === 'price') {
      const mid = String(d.match_id);
      if (!matchState[mid]) matchState[mid] = { prices: {}, meta: d.meta, score: d.score, ts: d.ts };
      matchState[mid].meta = d.meta || matchState[mid].meta;
      matchState[mid].score = d.score || matchState[mid].score;
      matchState[mid].ts = d.ts;
      if (!matchState[mid].prices[d.market]) matchState[mid].prices[d.market] = {};
      Object.assign(matchState[mid].prices[d.market], d.odds);
      ensureCard(mid, matchState[mid]);
      updateCard(mid, d.market, d.odds, d.movements);
    }
  } catch(_) {}
}

function rebuildAll() {
  for (const [mid, m] of Object.entries(matchState)) {
    ensureCard(mid, m);
    for (const [mkt, odds] of Object.entries(m.prices)) {
      updateCard(mid, mkt, odds, {});
    }
  }
  applyFilters();
}

async function bootstrap() {
  try {
    const [mr, pr] = await Promise.all([
      fetch(API() + '/markets').then(r => r.json()),
      fetch(API() + '/prices').then(r => r.json()),
    ]);
    for (const m of (mr.matches||[])) {
      const mid = String(m.match_id);
      if (!matchState[mid]) matchState[mid] = { prices: {}, meta: m, score: null, ts: Date.now()/1000 };
      matchState[mid].meta = m;
    }
    for (const [mid, mkts] of Object.entries(pr)) {
      if (!matchState[mid]) matchState[mid] = { prices: {}, meta: null, score: null, ts: Date.now()/1000 };
      Object.assign(matchState[mid].prices, mkts);
    }
    rebuildAll();
    setStatus(true); _retry = 1000;
  } catch(e) {
    console.error('bootstrap failed:', e);
    $('statusTxt').textContent = 'ERR — ' + e.message;
  }
}

function connect() {
  if (es) { es.close(); es = null; }
  setStatus(null);
  bootstrap().then(() => {
    es = new EventSource(API() + '/stream');
    es.addEventListener('snapshot', e => onSSEMessage(e));
    es.addEventListener('message', e => onSSEMessage(e));
    es.onerror = () => { es.close(); setStatus(false); _retry = Math.min(_retry*2, 30000); setTimeout(connect, _retry); };
  });
}

// stats poll
function pollStats() {
  fetch(API() + '/status').then(r => r.json()).then(s => {
    $('topStats').textContent = s.matches_in_memory + ' matches · ' + s.sse_updates_pushed + ' updates · ' + s.sse_clients + ' clients';
  }).catch(()=>{});
}
setInterval(pollStats, 5000);

// age refresh
setInterval(() => {
  document.querySelectorAll('.age').forEach(el => { el.textContent = timeAgo(parseFloat(el.dataset.ts)); });
}, 10000);

// init
connect();
</script>
</body>
</html>
