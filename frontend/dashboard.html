<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMU Sport — Cotes en Direct</title>
<link href="https://fonts.googleapis.com/css2?family=Marianne:ital,wght@0,400;0,700;1,400&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue-france: #000091;
  --red-marianne: #c9191e;
  --text-main: #161616;
  --text-mention: #666666;
  --bg-default: #ffffff;
  --bg-alt: #f6f6f6;
  --border-default: #e5e5e5;
  --success: #1f8d49;
  --warning: #d64d00;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-default); color: var(--text-main);
  font-family: 'Marianne', Arial, sans-serif; font-size: 14px; line-height: 1.5;
  min-height: 100vh; display: flex; flex-direction: column;
}
.gov-header {
  border-bottom: 2px solid var(--blue-france);
  background: var(--bg-default); padding: 16px 24px; flex-shrink: 0;
}
.gov-brand-container { display: flex; align-items: center; flex-wrap: wrap; gap: 16px; }
.marianne-logo {
  border-left: 3px solid var(--text-main); padding-left: 8px;
  font-weight: 700; text-transform: uppercase; font-size: 11px;
  letter-spacing: 0.05em; line-height: 1.1;
}
.marianne-logo span { color: var(--red-marianne); }
.app-title-area { flex: 1; padding-left: 16px; }
.app-title-area h1 { font-size: 18px; font-weight: 700; color: var(--blue-france); }
.app-title-area p { font-size: 12px; color: var(--text-mention); }
.api-config {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-alt); padding: 8px 12px;
  border: 1px solid var(--border-default); flex-wrap: wrap;
}
.gov-input {
  background: var(--bg-default); color: var(--text-main); border: 1px solid #858585;
  padding: 6px 10px; font-family: 'Roboto Mono', monospace; font-size: 12px; outline: none;
}
.gov-input:focus { outline: 2px solid var(--blue-france); }
.gov-btn {
  background: var(--blue-france); color: #fff; border: none; padding: 6px 14px;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Marianne', Arial, sans-serif;
}
.gov-btn:hover { background: #1b1bbf; }
.gov-tabs {
  background: var(--bg-alt); display: flex;
  border-bottom: 1px solid var(--border-default); padding: 0 24px; flex-shrink: 0;
}
.tab-btn {
  background: transparent; border: none; color: var(--text-main);
  padding: 12px 20px; font-size: 13px; font-weight: 700; cursor: pointer;
  border-bottom: 3px solid transparent; text-decoration: none; display: inline-block;
  font-family: 'Marianne', Arial, sans-serif;
}
.tab-btn:hover { background: rgba(0,0,145,0.05); }
.tab-btn.active { border-bottom-color: var(--blue-france); color: var(--blue-france); }
.status-bar {
  background: #eeeeee; padding: 6px 24px; font-size: 12px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border-default); flex-shrink: 0;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.live { background: var(--success); }
.dot.err  { background: var(--red-marianne); }
.dot.off  { background: #858585; }
.status-txt { font-size: 12px; }
.topbar-stats { font-size: 11px; color: var(--text-mention); margin-left: auto; white-space: nowrap; }
.toolbar {
  display: flex; gap: 8px; align-items: center; padding: 10px 24px;
  background: var(--bg-alt); border-bottom: 1px solid var(--border-default);
  flex-wrap: wrap; flex-shrink: 0;
}
.ctrl {
  background: var(--bg-default); color: var(--text-main); border: 1px solid #858585;
  padding: 5px 10px; font-family: 'Marianne', Arial, sans-serif; font-size: 12px; outline: none;
}
.ctrl:focus { outline: 2px solid var(--blue-france); }
.pill {
  background: var(--bg-default); border: 1px solid var(--blue-france);
  color: var(--blue-france); font-family: 'Marianne', Arial, sans-serif;
  font-size: 12px; padding: 4px 12px; cursor: pointer; font-weight: 700;
}
.pill:hover { background: rgba(0,0,145,0.05); }
.pill.active { background: var(--blue-france); color: #fff; }
.match-count { font-size: 12px; color: var(--text-mention); margin-left: auto; }
.grid {
  flex: 1; overflow-y: auto; padding: 16px 24px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
  gap: 12px; align-content: start;
}
.card {
  background: var(--bg-default); border: 1px solid var(--border-default);
  box-shadow: 0 2px 6px rgba(0,0,0,0.04); overflow: hidden;
  display: flex; flex-direction: column; transition: border-color .15s;
}
.card:hover { border-color: var(--blue-france); }
.card.live { border-left: 3px solid var(--red-marianne); }
.card-hdr {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 10px 12px 6px; background: var(--bg-alt);
  border-bottom: 1px solid var(--border-default);
}
.card-name {
  font-weight: 700; color: var(--blue-france); overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; text-decoration: none; font-size: 13px;
}
.card-name:hover { text-decoration: underline; }
.live-badge {
  background: var(--red-marianne); color: #fff; font-size: 9px;
  padding: 2px 6px; font-weight: 700; flex-shrink: 0;
}
.sport-badge { font-size: 9px; padding: 2px 6px; font-weight: 700; flex-shrink: 0; }
.sport-badge.tennis { background: #e3e3fd; color: var(--blue-france); }
.sport-badge.football { background: #e3f0ff; color: #0a6fd4; }
.card-info { font-size: 11px; color: var(--text-mention); padding: 4px 12px; background: var(--bg-default); }
.card-score { font-size: 12px; color: var(--blue-france); padding: 4px 12px; font-weight: 700; }
.odds-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border-default); overflow: hidden;
}
.odds-cell {
  background: var(--bg-default); padding: 8px; position: relative; display: flex; flex-direction: column;
}
.odds-label {
  font-size: 10px; text-transform: uppercase; color: var(--text-mention);
  margin-bottom: 2px; letter-spacing: 0.03em;
}
.odds-val {
  font-size: 17px; font-weight: 700; color: var(--text-main);
  font-family: 'Roboto Mono', monospace;
}
.odds-raw { font-size: 10px; color: var(--text-mention); }
.trend { font-size: 10px; margin-left: 3px; }
.trend.up   { color: var(--success); }
.trend.down { color: var(--red-marianne); }
.flash-up, .flash-down { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
.flash-up   { background: rgba(31,141,73,.15); }
.flash-down { background: rgba(201,25,30,.1); }
.flashing-up   .flash-up   { animation: flash-anim .6s ease-out; }
.flashing-down .flash-down { animation: flash-anim .6s ease-out; }
@keyframes flash-anim { 0%{opacity:1} 100%{opacity:0} }
.card-foot { display: flex; justify-content: space-between; padding: 4px 12px; font-size: 10px; color: var(--text-mention); border-top: 1px solid var(--border-default); background: var(--bg-alt); }
.empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-mention); font-size: 14px; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
</style>
</head>
<body>

<header class="gov-header">
  <div class="gov-brand-container">
    <div class="marianne-logo">République<br>Française<br><span>——</span></div>
    <div class="app-title-area">
      <h1>PMU Sport — Surveillance des Cotes</h1>
      <p>Suivi en temps réel des cotes sportives PMU</p>
    </div>
    <div class="api-config">
      <label style="font-size:12px;font-weight:700;white-space:nowrap;">Serveur API :</label>
      <input class="gov-input ctrl url-input" id="url" value="http://localhost:5500" placeholder="URL du serveur">
      <button class="gov-btn" id="connectBtn" onclick="connect()" style="cursor:pointer">Connecter</button>
      <div id="topStats" class="topbar-stats"></div>
    </div>
  </div>
</header>

<nav class="gov-tabs">
  <a class="tab-btn active" href="dashboard.html">Vue d'ensemble</a>
  <a class="tab-btn" href="chart.html">Graphique</a>
  <a class="tab-btn" href="stream.html">Journal SSE</a>
</nav>

<div class="status-bar">
  <div class="dot off" id="dot"></div>
  <span class="status-txt" id="statusTxt">connexion...</span>
</div>

<div class="toolbar">
  <input class="ctrl" id="search" placeholder="Rechercher joueur, équipe ou tournoi..." oninput="applyFilters()">
  <button class="pill active" data-filter="all"      onclick="setFilter('all',this)">Tous</button>
  <button class="pill"        data-filter="TENNIS"   onclick="setFilter('TENNIS',this)">Tennis</button>
  <button class="pill"        data-filter="FOOTBALL" onclick="setFilter('FOOTBALL',this)">Football</button>
  <button class="pill"        data-filter="moneyline" onclick="setFilter('moneyline',this)">Cotes Match</button>
  <button class="pill"        data-filter="handicap"  onclick="setFilter('handicap',this)">Handicap</button>
  <button class="pill"        data-filter="totals"    onclick="setFilter('totals',this)">Totaux</button>
  <span class="match-count" id="matchCount"></span>
</div>

<div class="grid" id="grid"><div class="empty" id="empty">En attente de données...</div></div>

<script>
const API = () => document.getElementById('url').value.trim();
let es = null;
let matchState = {};
let _retry = 1000;
let activeFilter = 'all';
let _statsPoll = null;

function $(id) { return document.getElementById(id); }

function setStatus(live) {
  const d = $('dot'), t = $('statusTxt');
  d.className = 'dot ' + (live === true ? 'live' : live === false ? 'err' : 'off');
  t.textContent = live === true ? 'Liaison active' : live === false ? 'Erreur — reconnexion...' : 'connexion...';
}

function timeAgo(ts) {
  const d = (Date.now()/1000) - ts;
  if (d < 5) return 'à l\'instant';
  if (d < 60) return Math.floor(d) + 's';
  return Math.floor(d/60) + 'min';
}

function applyFilters() {
  const q = ($('search').value || '').toLowerCase();
  const sportFilters = ['TENNIS', 'FOOTBALL'];
  const isSport = sportFilters.includes(activeFilter);
  let vis = 0;
  document.querySelectorAll('.card').forEach(c => {
    const textOk = !q || (c.dataset.matchname||'').includes(q) || (c.dataset.players||'').includes(q)
                      || (c.dataset.series||'').includes(q);
    const sportOk = !isSport || c.dataset.sport === activeFilter;
    const mktOk = isSport || activeFilter === 'all' || c.dataset.markets?.includes(activeFilter);
    const ok = textOk && sportOk && mktOk;
    c.style.display = ok ? '' : 'none';
    if (ok) vis++;
  });
  $('matchCount').textContent = vis + ' matchs';
  $('empty').style.display = (vis === 0 && Object.keys(matchState).length > 0) ? '' : 'none';
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function flashCell(cell, dir) {
  cell.classList.remove('flashing-up', 'flashing-down');
  void cell.offsetWidth;
  cell.classList.add(dir === 'up' ? 'flashing-up' : 'flashing-down');
  setTimeout(() => cell.classList.remove('flashing-up', 'flashing-down'), 700);
}

function ensureCard(mid, m) {
  if ($('c_' + mid)) return;
  $('empty').style.display = 'none';
  const prices = m.prices || {};
  const sport = m.meta?.sport || '';
  const mkts = Object.keys(prices).map(k =>
    k.toLowerCase().includes('match odds') || k.toLowerCase().includes('full time') ? 'moneyline'
    : k.toLowerCase().includes('handicap') ? 'handicap'
    : k.toLowerCase().includes('total') || k.toLowerCase().includes('over') ? 'totals' : k).join(' ');
  const players = (m.meta?.player_a||'') + ' ' + (m.meta?.player_b||'');
  const live = m.meta?.state === 'STARTED' || m.meta?.live;
  const score = m.score;
  let scoreHTML = '';
  if (live && score) {
    const sh = score.sets_home || [], sa = score.sets_away || [];
    let sets = '';
    for (let i = 0; i < Math.max(sh.length, sa.length); i++) {
      const h = sh[i] !== undefined && sh[i] >= 0 ? sh[i] : '-';
      const a = sa[i] !== undefined && sa[i] >= 0 ? sa[i] : '-';
      sets += h + '-' + a + ' ';
    }
    const serve = score.home_serve ? ' · service' : '';
    scoreHTML = '<div class="card-score">' + sets.trim() + ' | jeu ' + (score.home||0) + '-' + (score.away||0) + serve + '</div>';
  }
  let rows = '';
  for (const [mkt, odds] of Object.entries(prices).filter(([k]) =>
    k.toLowerCase().includes('match odds') || k.toLowerCase().includes('full time') || k.toLowerCase().includes('1x2')
  )) {
    const entries = Object.entries(odds);
    rows += '<div class="odds-row">';
    for (const [sel, odd] of entries) {
      const selShort = sel.length > 18 ? sel.slice(0,16)+'…' : sel;
      rows += '<div class="odds-cell" data-mkt="'+mkt+'" data-sel="'+sel+'">'
        + '<div class="flash-up"></div><div class="flash-down"></div>'
        + '<div class="odds-label">'+selShort+'</div>'
        + '<div class="odds-val">'+odd.toFixed(2)+'</div>'
        + '<div class="odds-raw">déc: '+odd.toFixed(2)+'</div>'
        + '</div>';
    }
    rows += '</div>';
  }
  const div = document.createElement('div');
  div.id = 'c_' + mid;
  div.className = 'card' + (live ? ' live' : '');
  div.dataset.matchname = (m.meta?.name||'').toLowerCase();
  div.dataset.players = players.toLowerCase();
  div.dataset.series = (m.meta?.competition||'').toLowerCase();
  div.dataset.markets = mkts;
  div.dataset.sport = sport;
  const sportBadge = sport === 'TENNIS' ? '<div class="sport-badge tennis">T</div>'
    : sport === 'FOOTBALL' ? '<div class="sport-badge football">F</div>' : '';
  div.innerHTML =
    '<div class="card-hdr">'
    + '<a class="card-name" href="chart.html?match_id=' + encodeURIComponent(mid) + '">' + (m.meta?.player_a||'?') + ' vs ' + (m.meta?.player_b||'?') + '</a>'
    + (live ? '<div class="live-badge">DIRECT</div>' : '')
    + sportBadge
    + '</div>'
    + '<div class="card-info">' + (m.meta?.competition||'') + ' · ' + (m.meta?.start_time ? new Date(m.meta.start_time).toLocaleString('fr-FR') : 'TBD') + '</div>'
    + scoreHTML
    + rows
    + '<div class="card-foot"><span>#' + mid + '</span><span class="age" data-ts="' + (m.ts||0) + '"></span></div>';
  $('grid').appendChild(div);
}

function updateCard(mid, mkt, odds, movements) {
  const card = $('c_' + mid);
  if (!card) return;
  for (const [sel, odd] of Object.entries(odds)) {
    const cell = card.querySelector('.odds-cell[data-mkt="'+mkt+'"][data-sel="'+sel+'"]');
    if (!cell) continue;
    const prev = parseFloat(cell.querySelector('.odds-val')?.textContent || '0');
    const dir = movements?.[sel] || (odd > prev ? 'up' : odd < prev ? 'down' : null);
    cell.querySelector('.odds-val').innerHTML = odd.toFixed(2)
      + (dir ? '<span class="trend '+(dir==='up'?'up':'down')+'">'+(dir==='up'?'▲':'▼')+'</span>' : '');
    cell.querySelector('.odds-raw').textContent = 'déc: ' + odd.toFixed(2);
    if (dir) flashCell(cell, dir);
  }
  const age = card.querySelector('.age');
  if (age) { age.dataset.ts = Date.now()/1000; age.textContent = timeAgo(Date.now()/1000); }
}

function onSSEMessage(e) {
  if (!e.data) return;
  try { const d = JSON.parse(e.data);
    if (d.type === 'snapshot') {
      for (const [mid, mkts] of Object.entries(d.prices||{})) {
        if (!matchState[mid]) matchState[mid] = { prices: {}, meta: null, score: null, ts: d.ts };
        Object.assign(matchState[mid].prices, mkts);
        matchState[mid].ts = d.ts;
      }
      rebuildAll();
      setStatus(true); _retry = 1000;
    } else if (d.type === 'price') {
      const mid = String(d.match_id);
      if (!matchState[mid]) matchState[mid] = { prices: {}, meta: d.meta, score: d.score, ts: d.ts };
      matchState[mid].meta = d.meta || matchState[mid].meta;
      matchState[mid].score = d.score || matchState[mid].score;
      matchState[mid].ts = d.ts;
      if (!matchState[mid].prices[d.market]) matchState[mid].prices[d.market] = {};
      Object.assign(matchState[mid].prices[d.market], d.odds);
      ensureCard(mid, matchState[mid]);
      updateCard(mid, d.market, d.odds, d.movements);
    }
  } catch(_) {}
}

function rebuildAll() {
  for (const [mid, m] of Object.entries(matchState)) {
    ensureCard(mid, m);
    for (const [mkt, odds] of Object.entries(m.prices)) { updateCard(mid, mkt, odds, {}); }
  }
  applyFilters();
}

async function bootstrap() {
  try {
    const [mr, pr] = await Promise.all([
      fetch(API() + '/markets').then(r => r.json()),
      fetch(API() + '/prices').then(r => r.json()),
    ]);
    for (const m of (mr.matches||[])) {
      const mid = String(m.match_id);
      if (!matchState[mid]) matchState[mid] = { prices: {}, meta: m, score: null, ts: Date.now()/1000 };
      matchState[mid].meta = m;
    }
    for (const [mid, mkts] of Object.entries(pr)) {
      if (!matchState[mid]) matchState[mid] = { prices: {}, meta: null, score: null, ts: Date.now()/1000 };
      Object.assign(matchState[mid].prices, mkts);
    }
    rebuildAll();
    setStatus(true); _retry = 1000;
  } catch(e) {
    console.error('bootstrap failed:', e);
    $('statusTxt').textContent = 'Erreur — ' + e.message;
  }
}

function connect() {
  if (es) { es.close(); es = null; }
  setStatus(null);
  bootstrap().then(() => {
    es = new EventSource(API() + '/stream');
    es.addEventListener('snapshot', e => onSSEMessage(e));
    es.addEventListener('message', e => onSSEMessage(e));
    es.onerror = () => { es.close(); setStatus(false); _retry = Math.min(_retry*2, 30000); setTimeout(connect, _retry); };
  });
}

function pollStats() {
  fetch(API() + '/status').then(r => r.json()).then(s => {
    $('topStats').textContent = s.matches_in_memory + ' matchs · ' + s.sse_updates_pushed + ' mises à jour · ' + s.sse_clients + ' clients';
  }).catch(()=>{});
}
setInterval(pollStats, 5000);

setInterval(() => {
  document.querySelectorAll('.age').forEach(el => { el.textContent = timeAgo(parseFloat(el.dataset.ts)); });
}, 10000);

connect();
</script>
</body>
</html>
