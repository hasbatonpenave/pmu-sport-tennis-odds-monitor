<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMU Sport — Historique des Cotes</title>
<link href="https://fonts.googleapis.com/css2?family=Marianne:ital,wght@0,400;0,700;1,400&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root {
  --blue-france: #000091;
  --red-marianne: #c9191e;
  --text-main: #161616;
  --text-mention: #666666;
  --bg-default: #ffffff;
  --bg-alt: #f6f6f6;
  --border-default: #e5e5e5;
  --success: #1f8d49;
  --warning: #d64d00;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-default); color: var(--text-main);
  font-family: 'Marianne', Arial, sans-serif; font-size: 14px; line-height: 1.5;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}
.gov-header {
  border-bottom: 2px solid var(--blue-france);
  background: var(--bg-default); padding: 12px 24px; flex-shrink: 0;
}
.gov-brand-container { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
.marianne-logo {
  border-left: 3px solid var(--text-main); padding-left: 8px;
  font-weight: 700; text-transform: uppercase; font-size: 11px;
  letter-spacing: 0.05em; line-height: 1.1;
}
.marianne-logo span { color: var(--red-marianne); }
.app-title-area { flex: 1; padding-left: 16px; }
.app-title-area h1 { font-size: 16px; font-weight: 700; color: var(--blue-france); }
.app-title-area p { font-size: 11px; color: var(--text-mention); }
.api-config {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-alt); padding: 6px 10px; border: 1px solid var(--border-default);
}
.gov-input {
  background: var(--bg-default); color: var(--text-main); border: 1px solid #858585;
  padding: 5px 10px; font-family: 'Roboto Mono', monospace; font-size: 12px; outline: none;
}
.gov-input:focus { outline: 2px solid var(--blue-france); }
.gov-btn {
  background: var(--blue-france); color: #fff; border: none; padding: 5px 12px;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Marianne', Arial, sans-serif;
}
.gov-btn:hover { background: #1b1bbf; }
.gov-tabs {
  background: var(--bg-alt); display: flex;
  border-bottom: 1px solid var(--border-default); padding: 0 24px; flex-shrink: 0;
}
.tab-btn {
  background: transparent; border: none; color: var(--text-main);
  padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
  border-bottom: 3px solid transparent; text-decoration: none; display: inline-block;
  font-family: 'Marianne', Arial, sans-serif;
}
.tab-btn:hover { background: rgba(0,0,145,0.05); }
.tab-btn.active { border-bottom-color: var(--blue-france); color: var(--blue-france); }
.main-layout { flex: 1; display: flex; overflow: hidden; }
.sidebar {
  width: 280px; flex-shrink: 0; overflow-y: auto;
  background: var(--bg-alt); border-right: 1px solid var(--border-default); padding: 10px;
}
.sidebar h2 { font-size: 13px; font-weight: 700; color: var(--blue-france); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.match-item {
  padding: 8px; cursor: pointer; font-size: 12px;
  border-left: 2px solid transparent; transition: background .12s; margin-bottom: 2px;
  background: var(--bg-default); border-bottom: 1px solid var(--border-default);
}
.match-item:hover { background: rgba(0,0,145,0.04); }
.match-item.selected { border-left-color: var(--blue-france); background: #f0f0ff; }
.match-item .mi-name { color: var(--text-main); font-weight: 700; }
.match-item .mi-info { font-size: 11px; color: var(--text-mention); }
.live-dot { width: 6px; height: 6px; background: var(--red-marianne); border-radius: 50%; display: inline-block; margin-right: 4px; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar {
  flex-shrink: 0; padding: 8px 16px; background: var(--bg-alt);
  border-bottom: 1px solid var(--border-default); display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.pill {
  background: var(--bg-default); border: 1px solid var(--blue-france);
  color: var(--blue-france); font-family: 'Marianne', Arial, sans-serif;
  font-size: 11px; padding: 3px 10px; cursor: pointer; font-weight: 700;
}
.pill:hover { background: rgba(0,0,145,0.05); }
.pill.active { background: var(--blue-france); color: #fff; }
.chart-wrap { flex: 1; padding: 10px; position: relative; min-height: 0; }
.chart-wrap canvas { width: 100% !important; height: 100% !important; }
.empty-state {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: var(--text-mention); font-size: 14px; text-align: center;
}
.info-bar {
  flex-shrink: 0; padding: 8px 16px; background: var(--bg-alt);
  border-top: 1px solid var(--border-default); display: flex; gap: 16px; flex-wrap: wrap;
}
.info-stat .lbl { color: var(--text-mention); font-size: 10px; text-transform: uppercase; }
.info-stat .val { color: var(--text-main); font-weight: 700; font-family: 'Roboto Mono', monospace; }
.info-stat .delta { font-weight: 700; }
.match-hdr {
  flex-shrink: 0; padding: 8px 16px; background: var(--bg-default);
  border-bottom: 1px solid var(--border-default); display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.match-hdr-title { color: var(--text-main); font-weight: 700; font-size: 13px; flex: 1; }
.match-hdr-ph {
  color: var(--text-mention); font-size: 12px; padding: 10px 16px; flex-shrink: 0;
  background: var(--bg-alt); border-bottom: 1px solid var(--border-default);
}
.markets-panel { flex-shrink: 0; overflow-y: auto; max-height: 42vh; padding: 8px 12px 4px; border-bottom: 1px solid var(--border-default); }
.markets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; }
.mkt-card { background: var(--bg-alt); border: 1px solid var(--border-default); padding: 6px 8px; }
.mkt-name { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-mention); margin-bottom: 5px; font-weight: 700; }
.sel-grid { display: flex; flex-wrap: wrap; gap: 3px; }
.sel-btn {
  background: var(--bg-default); border: 1px solid var(--border-default);
  padding: 4px 8px; cursor: pointer; font-size: 11px;
  display: flex; flex-direction: column; align-items: center; min-width: 58px;
  position: relative; transition: border-color .12s; font-family: 'Marianne', Arial, sans-serif;
}
.sel-btn:hover { border-color: var(--blue-france); }
.sel-btn.active { border-color: var(--blue-france); color: var(--blue-france); background: rgba(0,0,145,.06); }
.sel-btn.suspended { opacity: 0.45; }
.sel-btn.suspended .sel-odd { text-decoration: line-through; }
.sel-susp-lbl { font-size: 8px; text-transform: uppercase; color: var(--text-mention); margin-top: 1px; }
.sel-lbl { font-size: 10px; color: var(--text-mention); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
.sel-odd { font-size: 13px; font-weight: 700; color: var(--text-main); font-family: 'Roboto Mono', monospace; }
.sel-trend { position: absolute; top: 2px; right: 3px; font-size: 9px; }
.sel-trend.up   { color: var(--success); }
.sel-trend.down { color: var(--red-marianne); }
.flash-up, .flash-down { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
.flash-up   { background: rgba(31,141,73,.15); }
.flash-down { background: rgba(201,25,30,.1); }
.flashing-up   .flash-up   { animation: flash .6s ease-out; }
.flashing-down .flash-down { animation: flash .6s ease-out; }
@keyframes flash { 0%{opacity:1} 100%{opacity:0} }
.mkts-empty { color: var(--text-mention); font-size: 12px; padding: 16px 4px; text-align: center; }
.chart-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.sidebar-err { color: var(--red-marianne); font-size: 12px; padding: 8px; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
</style>
</head>
<body>

<header class="gov-header">
  <div class="gov-brand-container">
    <div class="marianne-logo">République<br>Française<br><span>——</span></div>
    <div class="app-title-area">
      <h1>PMU Sport — Historique des Cotes</h1>
      <p>Analyse graphique de l'évolution des cotes</p>
    </div>
    <div class="api-config">
      <label style="font-size:12px;font-weight:700;white-space:nowrap;">Serveur :</label>
      <input class="gov-input" id="url" value="http://localhost:5500" placeholder="URL du serveur" style="flex:1;min-width:160px">
      <button class="gov-btn" onclick="init()" style="cursor:pointer">Actualiser</button>
    </div>
  </div>
</header>

<nav class="gov-tabs">
  <a class="tab-btn" href="dashboard.html">Vue d'ensemble</a>
  <a class="tab-btn active" href="chart.html">Graphique</a>
  <a class="tab-btn" href="stream.html">Journal SSE</a>
</nav>

<div class="main-layout">
  <div class="sidebar" id="sidebar">
    <h2>Matchs</h2>
    <div id="sidebarStatus">Chargement...</div>
  </div>
  <div class="main">
    <div id="matchHeader" class="match-hdr-ph">← Sélectionnez un match dans la liste</div>
    <div class="markets-panel" id="marketsPanel" style="display:none">
      <div id="marketsInner"></div>
    </div>
    <div class="chart-section">
      <div class="toolbar" id="toolbar">
        <span style="color:var(--text-mention);font-size:12px" id="chartCrumb">Cliquez une sélection ci-dessus</span>
      </div>
      <div class="chart-wrap" id="chartWrap">
        <div class="empty-state" id="placeholder">Sélectionnez un match puis une cote</div>
        <canvas id="chart" style="display:none"></canvas>
      </div>
      <div class="info-bar" id="infoBar"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const apiUrl = () => $('url').value.trim();
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let matches = {};
let livePrices = {};
let chart = null;
let es = null;
let selMatch = null;
let selMarket = '';
let selPlayer = '';
let allPoints = [];
let timeWindow = 0;
let lastLiveTs = 0;
const prevBtnOdds = {};

async function init() {
  disconnectSSE();
  resetChart();
  matches = {}; livePrices = {};
  try {
    const [mr, pr] = await Promise.all([
      fetch(apiUrl() + '/markets').then(r => r.json()),
      fetch(apiUrl() + '/prices').then(r => r.json()),
    ]);
    for (const m of (mr.matches || [])) matches[String(m.match_id)] = m;
    livePrices = pr;
    renderSidebar();
  } catch(e) {
    $('sidebarStatus').innerHTML = '<span style="color:var(--red-marianne)">Erreur : ' + e.message + '</span>';
  }
}

function renderSidebar() {
  const sorted = Object.entries(matches).sort((a,b) => {
    const la = a[1].state === 'STARTED' ? 0 : 1;
    const lb = b[1].state === 'STARTED' ? 0 : 1;
    return la - lb || (a[1].player_a||'').localeCompare(b[1].player_a||'');
  });
  let html = '<h2>Matchs</h2>';
  for (const [mid, m] of sorted) {
    const live = m.state === 'STARTED';
    html += '<div class="match-item' + (mid===selMatch?' selected':'') + '" data-mid="' + mid + '">'
      + '<div class="mi-name">' + (live?'<span class="live-dot"></span>':'')
      + esc(m.player_a||'?') + ' vs ' + esc(m.player_b||'?') + '</div>'
      + '<div class="mi-info">' + esc(m.competition||'') + ' · '
      + (m.start_time ? new Date(m.start_time).toLocaleDateString('fr-FR') : 'TBD') + '</div>'
      + '</div>';
  }
  $('sidebar').innerHTML = html + '<div id="sidebarStatus" style="display:none"></div>';
  $('sidebar').querySelectorAll('.match-item').forEach(el =>
    el.addEventListener('click', () => selectMatch(el.dataset.mid))
  );
}

function selectMatch(mid) {
  selMatch = mid; selMarket = ''; selPlayer = '';
  allPoints = []; lastLiveTs = 0;
  resetChart();
  renderSidebar();
  const m = matches[mid] || {};
  const live = m.state === 'STARTED';
  const name = esc((m.player_a||'?') + ' vs ' + (m.player_b||'?'));
  $('matchHeader').className = 'match-hdr';
  $('matchHeader').innerHTML = '<span class="match-hdr-title">' + name + '</span>'
    + (live ? '<span style="background:var(--red-marianne);color:#fff;font-size:9px;font-weight:700;padding:2px 6px">DIRECT</span>' : '')
    + (m.competition ? '<span style="font-size:11px;color:var(--text-mention)">' + esc(m.competition) + '</span>' : '');
  $('marketsPanel').style.display = '';
  $('marketsInner').innerHTML = '<div class="mkts-empty">Chargement des marchés...</div>';
  fetch(apiUrl() + '/match-markets/' + mid)
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      if (!livePrices[mid]) livePrices[mid] = {};
      for (const [mkt, sels] of Object.entries(data.markets || {})) {
        if (!livePrices[mid][mkt]) livePrices[mid][mkt] = {};
        Object.assign(livePrices[mid][mkt], sels);
      }
      if (selMatch === mid) renderMarketsGrid(mid);
    })
    .catch(() => { if (selMatch === mid) renderMarketsGrid(mid); });
  connectSSE();
}

function renderMarketsGrid(mid) {
  const mkts = livePrices[mid] || {};
  const mktKeys = Object.keys(mkts);
  if (!mktKeys.length) {
    $('marketsInner').innerHTML = '<div class="mkts-empty">Aucune donnée de marché</div>';
    return;
  }
  let html = '<div class="markets-grid">';
  for (const mkt of mktKeys) {
    const sels = mkts[mkt] || {};
    const selEntries = Object.entries(sels);
    if (!selEntries.length) continue;
    const btns = selEntries.map(([sel, odd]) => {
      const isSusp = odd == null;
      const isActive = selMarket === mkt && selPlayer === sel;
      const oddStr = isSusp ? '—' : odd.toFixed(2);
      return '<div class="sel-btn' + (isActive?' active':'') + (isSusp?' suspended':'') + '" data-mkt="' + esc(mkt) + '" data-sel="' + esc(sel) + '">'
        + '<div class="flash-up"></div><div class="flash-down"></div>'
        + '<div class="sel-lbl">' + esc(sel.length>13?sel.slice(0,11)+'…':sel) + '</div>'
        + '<div class="sel-odd">' + oddStr + '</div>'
        + (isSusp ? '<div class="sel-susp-lbl">susp</div>' : '<span class="sel-trend"></span>')
        + '</div>';
    }).join('');
    html += '<div class="mkt-card"><div class="mkt-name">' + esc(mkt) + '</div><div class="sel-grid">' + btns + '</div></div>';
  }
  html += '</div>';
  $('marketsInner').innerHTML = html;
  $('marketsInner').querySelectorAll('.sel-btn').forEach(el =>
    el.addEventListener('click', () => pickSelection(el.dataset.mkt, el.dataset.sel, el))
  );
}

function pickSelection(mkt, sel, el) {
  $('marketsInner').querySelectorAll('.sel-btn.active').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selMarket = mkt; selPlayer = sel;
  allPoints = []; lastLiveTs = 0;
  resetChart();
  buildToolbar();
  fetchHistory();
}

function buildToolbar() {
  const crumb = selPlayer
    ? '<b style="color:var(--text-main)">' + esc(selPlayer) + '</b> <span style="color:var(--text-mention)">·</span> ' + esc(selMarket)
    : '<span style="color:var(--text-mention)">Cliquez une sélection ci-dessus</span>';
  let html = '<span style="flex:1;font-size:12px">' + crumb + '</span>';
  [[5,'5min'],[15,'15min'],[60,'1h'],[360,'6h'],[0,'Tout']].forEach(([t,l]) => {
    html += '<button class="pill' + (timeWindow===t?' active':'') + '" data-t="' + t + '">' + l + '</button>';
  });
  $('toolbar').innerHTML = html;
  $('toolbar').querySelectorAll('[data-t]').forEach(el =>
    el.addEventListener('click', () => { timeWindow = parseInt(el.dataset.t); buildToolbar(); drawChart(); })
  );
}

async function fetchHistory() {
  if (!selMatch || !selPlayer) return;
  $('placeholder').textContent = 'Chargement...';
  $('placeholder').style.display = '';
  $('chart').style.display = 'none';
  try {
    const r = await fetch(apiUrl() + '/history'
      + '?match_id=' + selMatch
      + '&selection=' + encodeURIComponent(selPlayer)
      + '&market=' + encodeURIComponent(selMarket)
      + '&limit=2000');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    allPoints = (data.points || []).map(p => ({ x: p.ts*1000, y: p.odd }));
    const cur = livePrices[selMatch]?.[selMarket]?.[selPlayer];
    if (cur != null) {
      const last = allPoints.length ? allPoints[allPoints.length-1].x/1000 : 0;
      if (Date.now()/1000 - last > 2) allPoints.push({ x: Date.now(), y: cur });
    }
    lastLiveTs = allPoints.length ? allPoints[allPoints.length-1].x : 0;
    drawChart();
  } catch(e) {
    $('placeholder').textContent = 'Erreur : ' + e.message;
  }
}

function resetChart() {
  if (chart) { chart.destroy(); chart = null; }
  $('chart').style.display = 'none';
  $('placeholder').style.display = '';
  $('placeholder').textContent = 'Sélectionnez un match puis une cote';
  $('infoBar').innerHTML = '';
  buildToolbar();
}

function drawChart() {
  if (chart) { chart.destroy(); chart = null; }
  let pts = [...allPoints];
  if (timeWindow > 0) {
    const cut = Date.now() - timeWindow*60000;
    const before = pts.filter(p => p.x < cut);
    pts = pts.filter(p => p.x >= cut);
    if (before.length && pts.length) pts = [before[before.length-1], ...pts];
  }
  if (!pts.length) {
    $('placeholder').textContent = 'Aucune donnée pour cette sélection';
    $('placeholder').style.display = '';
    return;
  }
  $('chart').style.display = '';
  $('placeholder').style.display = 'none';
  const ctx = $('chart').getContext('2d');
  const _yv = pts.map(p=>p.y), _ymn=Math.min(..._yv), _ymx=Math.max(..._yv);
  const _ypad = Math.max(0.02, (_ymx-_ymn)*0.1) || 0.05;
  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets: [{ label: selPlayer + ' — ' + selMarket, data: pts,
        borderColor: '#000091', backgroundColor: 'rgba(0,0,145,0.05)',
        borderWidth: 2, pointRadius: pts.length>300?0:2, pointHoverRadius:4, fill:true, tension:0.05 }] },
    options: {
      responsive:true, maintainAspectRatio:false, animation:false,
      interaction:{ intersect:false, mode:'nearest' },
      scales: {
        x: { type:'time', time:{ unit:timeWindow<=15?'minute':timeWindow<=360?'hour':'day',
              displayFormats:{minute:'HH:mm',hour:'HH:mm',day:'d MMM'} },
             grid:{color:'#e5e5e5'}, ticks:{color:'#666666',font:{size:10},maxTicksLimit:12} },
        y: { min:_ymn-_ypad, max:_ymx+_ypad, grid:{color:'#e5e5e5'}, ticks:{color:'#666666',font:{size:10},callback:v=>v.toFixed(2)} }
      },
      plugins: {
        legend:{display:false},
        tooltip:{ backgroundColor:'#f6f6f6', borderColor:'#e5e5e5', borderWidth:1,
          titleColor:'#161616', bodyColor:'#000091',
          callbacks:{label:ctx=>ctx.parsed.y.toFixed(2)} }
      }
    }
  });
  updateInfoBar(pts);
}

function updateInfoBar(pts) {
  if (!pts?.length) return;
  const vals = pts.map(p=>p.y);
  const cur=vals[vals.length-1], min=Math.min(...vals), max=Math.max(...vals);
  const delta=cur-vals[0];
  const col=delta>0?'var(--success)':delta<0?'var(--red-marianne)':'var(--text-main)';
  $('infoBar').innerHTML =
    st('Actuel',cur.toFixed(2)) + st('Min',min.toFixed(2)) + st('Max',max.toFixed(2)) +
    st('Δ',(delta>=0?'+':'')+delta.toFixed(2),col) + st('Points',pts.length) +
    (allPoints.length!==pts.length?st('Total',allPoints.length):'');
}
function st(l,v,col='') {
  return '<div class="info-stat"><div class="lbl">'+l+'</div><div class="val"'+(col?' style="color:'+col+'"':'')+'>'+v+'</div></div>';
}

function pushLivePoint(ts, odd) {
  const x = ts*1000;
  if (x <= lastLiveTs) return;
  allPoints.push({x,y:odd}); lastLiveTs=x;
  if (allPoints.length>5000) allPoints=allPoints.slice(-5000);
  if (!chart) return;
  const ds=chart.data.datasets[0].data;
  ds.push({x,y:odd});
  if (timeWindow>0) { const cut=Date.now()-timeWindow*60000; while(ds.length>1&&ds[0].x<cut) ds.shift(); }
  if (ds.length>1000) ds.shift();
  chart.update('none');
  updateInfoBar(ds);
}

function flashBtn(btn, dir) {
  btn.classList.remove('flashing-up','flashing-down');
  void btn.offsetWidth;
  btn.classList.add(dir==='up'?'flashing-up':'flashing-down');
  setTimeout(()=>btn.classList.remove('flashing-up','flashing-down'),700);
}

function patchMarketsGrid(mid, mkt, oddsObj) {
  if (mid !== selMatch) return;
  const inner = $('marketsInner');
  if (!inner) return;
  for (const [sel, odd] of Object.entries(oddsObj)) {
    const btn = inner.querySelector('.sel-btn[data-mkt="' + CSS.escape(mkt) + '"][data-sel="' + CSS.escape(sel) + '"]');
    if (!btn) { renderMarketsGrid(mid); return; }
    const isSusp = odd == null;
    const wasSusp = btn.classList.contains('suspended');
    btn.classList.toggle('suspended', isSusp);
    const k = mid+'|'+mkt+'|'+sel;
    const prev = prevBtnOdds[k];
    prevBtnOdds[k] = odd;
    const oddEl = btn.querySelector('.sel-odd');
    if (oddEl) { oddEl.textContent = isSusp ? '—' : odd.toFixed(2); oddEl.style.textDecoration = isSusp?'line-through':''; }
    let suspLbl = btn.querySelector('.sel-susp-lbl');
    let trendEl = btn.querySelector('.sel-trend');
    if (isSusp && !suspLbl) { if(trendEl)trendEl.remove(); btn.insertAdjacentHTML('beforeend','<div class="sel-susp-lbl">susp</div>'); }
    else if (!isSusp && suspLbl) { suspLbl.remove(); btn.insertAdjacentHTML('beforeend','<span class="sel-trend"></span>'); trendEl=btn.querySelector('.sel-trend'); }
    if (!isSusp && wasSusp) { flashBtn(btn,'up'); }
    else if (!isSusp && !wasSusp && trendEl) {
      const dir = prev===undefined?null:odd>prev+0.001?'up':odd<prev-0.001?'down':null;
      trendEl.className='sel-trend'+(dir?' '+dir:'');
      trendEl.textContent=dir==='up'?'▲':dir==='down'?'▼':'';
      if(dir) flashBtn(btn,dir);
    }
  }
}

function connectSSE() {
  disconnectSSE();
  es = new EventSource(apiUrl() + '/stream');
  es.addEventListener('snapshot', e => {
    try {
      const d = JSON.parse(e.data);
      if (d.prices) {
        for (const [mid, mkts] of Object.entries(d.prices)) {
          if (!livePrices[mid]) livePrices[mid] = {};
          for (const [m, sels] of Object.entries(mkts))
            livePrices[mid][m] = Object.assign(livePrices[mid][m]||{}, sels);
        }
      }
      if (selMatch) renderMarketsGrid(selMatch);
    } catch(_) {}
  });
  es.addEventListener('message', e => {
    if (!e.data) return;
    try {
      const d = JSON.parse(e.data);
      if (d.type !== 'price') return;
      const mid = String(d.match_id);
      if (!livePrices[mid]) livePrices[mid] = {};
      if (!livePrices[mid][d.market]) livePrices[mid][d.market] = {};
      Object.assign(livePrices[mid][d.market], d.odds);
      if (d.meta) matches[mid] = d.meta;
      if (mid === selMatch) patchMarketsGrid(mid, d.market, d.odds);
      if (mid===selMatch && d.market===selMarket && d.odds?.[selPlayer]!=null) pushLivePoint(d.ts, d.odds[selPlayer]);
    } catch(_) {}
  });
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}

function disconnectSSE() { if (es) { es.close(); es=null; } }

buildToolbar();
init().then(() => {
  const mid = new URLSearchParams(location.search).get('match_id');
  if (mid && matches[mid]) selectMatch(mid);
});
setInterval(renderSidebar, 30000);
</script>
