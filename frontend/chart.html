<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMU SPORT — Odds Chart</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg:#060a0f; --bg2:#0c1420; --bg3:#111d2e; --border:#1a2e45;
    --accent:#00d4aa; --text:#8ab4d4; --text-hi:#cde4f7; --green:#00e676; --red:#ff4f4f;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Fira Mono','Cascadia Code','Consolas',monospace;
    font-size:12px; min-height:100vh;
    display:flex; flex-direction:column;
  }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#2a4060; border-radius:3px; }

  .topbar {
    position:sticky; top:0; z-index:100; flex-shrink:0;
    background:var(--bg2); border-bottom:1px solid var(--border);
    padding:10px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .logo { color:var(--accent); font-weight:700; font-size:13px; letter-spacing:0.07em; }
  .logo span { color:var(--text); font-weight:400; }
  .ctrl {
    background:var(--bg3); color:var(--text); border:1px solid var(--border);
    padding:5px 10px; border-radius:4px; font:11px 'Fira Mono','Cascadia Code','Consolas',monospace;
    outline:none;
  }
  .ctrl:focus, .ctrl:hover { border-color:var(--accent); }
  .main-layout { flex:1; display:flex; overflow:hidden; }
  .sidebar {
    width:280px; flex-shrink:0; overflow-y:auto;
    background:var(--bg2); border-right:1px solid var(--border); padding:10px;
  }
  .sidebar h2 { font-size:13px; font-weight:600; color:var(--text-hi); margin-bottom:8px; }
  .match-item {
    padding:8px; border-radius:4px; cursor:pointer; font-size:11px;
    border-left:2px solid transparent; transition:background .12s; margin-bottom:2px;
  }
  .match-item:hover { background:rgba(0,212,170,.03); }
  .match-item.selected { border-left-color:var(--accent); background:rgba(0,212,170,.04); }
  .match-item .mi-name { color:var(--text-hi); font-weight:600; }
  .match-item .mi-info { font-size:10px; color:#3a6080; }
  .live-dot { width:6px; height:6px; background:var(--red); border-radius:50%; display:inline-block; margin-right:4px; }

  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .toolbar {
    flex-shrink:0; padding:8px 16px; background:var(--bg2);
    border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  }
  .pill {
    background:var(--bg3); color:var(--text); border:1px solid var(--border);
    padding:4px 10px; border-radius:4px; font:11px 'Fira Mono','Cascadia Code','Consolas',monospace;
    cursor:pointer; transition:border-color .15s,background .12s;
  }
  .pill:hover { border-color:var(--accent); }
  .pill.active { border-color:var(--accent); color:var(--accent); background:rgba(0,212,170,.06); }

  .chart-wrap { flex:1; padding:10px; position:relative; }
  .info-bar {
    flex-shrink:0; padding:8px 16px; background:var(--bg2); border-top:1px solid var(--border);
    display:flex; gap:16px; flex-wrap:wrap;
  }
  .info-stat { font-size:11px; }
  .info-stat .lbl { color:#3a6080; font-size:9px; text-transform:uppercase; }
  .info-stat .val { color:var(--text-hi); font-weight:600; }
  .empty-state { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#3a6080; font-size:13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">PMU<span> / Odds Chart</span></div>
  <input class="ctrl" id="url" value="http://localhost:5500" placeholder="API URL" style="flex:1;min-width:200px">
  <button class="ctrl" onclick="reload()" style="cursor:pointer">Reload</button>
</div>

<div class="main-layout">
  <div class="sidebar">
    <h2>Matches</h2>
    <div id="loading">Loading matches...</div>
  </div>
  <div class="main">
    <div class="toolbar">
      <div id="selPills" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <span style="flex:1"></span>
      <button class="pill time-pill active" data-m="5">5m</button>
      <button class="pill time-pill" data-m="15">15m</button>
      <button class="pill time-pill" data-m="60">1h</button>
      <button class="pill time-pill" data-m="360">6h</button>
      <button class="pill time-pill" data-m="0">All</button>
    </div>
    <div class="chart-wrap" id="chartWrap">
      <div class="empty-state" id="noData">Select a match and player to view price history</div>
      <canvas id="chart" style="display:none"></canvas>
    </div>
    <div class="info-bar" id="infoBar"></div>
  </div>
</div>

<script>
const API = () => document.getElementById('url').value.trim();
let chart = null, matchMeta = {}, matchPrices = {}, livePoints = [];
let selMatch = null, selPlayer = null, selMarket = '', timeMins = 5;
let es = null;
const MAIN_MARKETS = ['full time', 'match odds', '1x2'];

function reload() { selMatch = null; selPlayer = null; livePoints = []; if(es) es.close(); destroyChart(); loadMatches(); }

async function loadMatches() {
  const l = document.getElementById('loading');
  l.textContent = 'Loading matches...';
  try {
    const [mr, pr] = await Promise.all([
      fetch(API()+'/markets').then(r=>r.json()),
      fetch(API()+'/prices').then(r=>r.json()),
    ]);
    for (const m of (mr.matches||[])) matchMeta[String(m.match_id)] = m;
    matchPrices = pr;
    renderSidebar();
    if (!Object.keys(matchMeta).length) l.textContent = 'No matches yet. Start the server.';
  } catch(e) { l.textContent = 'Error: ' + e.message; }
}

function renderSidebar() {
  const cont = document.getElementById('loading').parentNode;
  const items = Object.entries(matchMeta)
    .sort((a,b) => (a[1].state==='STARTED' ? -1 : 1) - (b[1].state==='STARTED' ? -1 : 1));
  let html = '';
  for (const [mid, m] of items) {
    const live = m.state === 'STARTED';
    const sel = selMatch === mid ? ' selected' : '';
    html += '<div class="match-item'+sel+'" data-mid="'+mid+'">'
      + '<div class="mi-name">' + (live?'<span class="live-dot"></span>':'') + (m.player_a||'?') + ' vs ' + (m.player_b||'?') + '</div>'
      + '<div class="mi-info">' + (m.competition||'') + ' · ' + (m.start_time ? new Date(m.start_time).toLocaleDateString() : '') + '</div>'
      + '</div>';
  }
  cont.innerHTML = '<h2>Matches</h2>' + html;
  cont.querySelectorAll('.match-item').forEach(el => {
    el.addEventListener('click', () => selectMatch(el.dataset.mid));
  });
}

function selectMatch(mid) {
  selMatch = mid; selPlayer = null; livePoints = [];
  destroyChart();
  renderSidebar();
  // determine 1X2 market from available prices
  const mkts = Object.keys(matchPrices[mid] || {});
  selMarket = mkts.find(k => MAIN_MARKETS.some(m => k.toLowerCase().includes(m))) || mkts[0] || '';
  buildToolbar(mid);
  // auto-pick first player
  const m = matchMeta[mid];
  if (m && selMarket) { selPlayer = m.player_a; updateToolbar(); fetchHistory(); }
  connectSSE();
}

function buildToolbar(mid) {
  const m = matchMeta[selMatch];
  if (!m) return;
  const mkts = Object.keys(matchPrices[mid] || {});

  let html = '';
  [m.player_a, m.player_b].filter(Boolean).forEach(p => {
    const cls = selPlayer === p ? ' pill active' : 'pill';
    html += '<button class="'+cls+'" data-p="'+p+'">'+p+'</button>';
  });
  if (mkts.length > 1) {
    html += '<span style="color:#3a6080;font-size:11px;margin-left:8px">Mkt:</span>';
    mkts.forEach(k => {
      const short = k.length > 20 ? k.slice(0,18)+'…' : k;
      const cls = selMarket === k ? ' pill active' : 'pill';
      html += '<button class="'+cls+'" data-mkt="'+k+'">'+short+'</button>';
    });
  }
  document.getElementById('selPills').innerHTML = html;

  document.querySelectorAll('#selPills [data-p]').forEach(p => {
    p.addEventListener('click', () => { selPlayer = p.dataset.p; updateToolbar(); fetchHistory(); });
  });
  document.querySelectorAll('#selPills [data-mkt]').forEach(p => {
    p.addEventListener('click', () => { selMarket = p.dataset.mkt; updateToolbar(); fetchHistory(); });
  });
}

function updateToolbar() {
  document.querySelectorAll('#selPills [data-p]').forEach(p => {
    p.classList.toggle('active', p.dataset.p === selPlayer);
  });
  document.querySelectorAll('#selPills [data-mkt]').forEach(p => {
    p.classList.toggle('active', p.dataset.mkt === selMarket);
  });
}

function destroyChart() {
  if (chart) { chart.destroy(); chart = null; }
  document.getElementById('chart').style.display = 'none';
  document.getElementById('noData').style.display = '';
  document.getElementById('infoBar').innerHTML = '';
}

async function fetchHistory() {
  if (!selMatch || !selPlayer) return;
  try {
    const r = await fetch(API()+'/history?match_id='+selMatch+'&selection='+encodeURIComponent(selPlayer)+'&market='+encodeURIComponent(selMarket)+'&limit=5000');
    const data = await r.json();
    livePoints = (data.points||[]).map(p => ({ x: p.ts*1000, y: p.odd }));
    // add current price if fresher
    try {
      const pr = await fetch(API()+'/prices').then(r=>r.json());
      const cur = pr?.[selMatch]?.[selMarket]?.[selPlayer];
      if (cur !== undefined && (!livePoints.length || (Date.now()/1000 - livePoints[livePoints.length-1].x/1000) > 2)) {
        livePoints.push({ x: Date.now(), y: cur });
      }
    } catch(_) {}
    drawChart();
  } catch(e) { console.warn('history fetch error:', e); }
}

function drawChart() {
  destroyChart();
  let pts = [...livePoints];
  if (timeMins > 0) {
    const cutoff = Date.now() - timeMins*60*1000;
    pts = pts.filter(p => p.x >= cutoff);
  }
  if (!pts.length) return;

  const ctx = document.getElementById('chart').getContext('2d');
  document.getElementById('chart').style.display = '';
  document.getElementById('noData').style.display = 'none';

  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets: [{
      label: selPlayer + ' — ' + selMarket,
      data: pts,
      borderColor: '#00d4aa',
      backgroundColor: 'rgba(0,212,170,0.08)',
      borderWidth: 1.5, pointRadius: 2, pointHoverRadius: 5, fill: true, tension: 0.1,
    }]},
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      scales: {
        x: {
          type: 'time', time: { unit: timeMins <= 15 ? 'minute' : 'hour', displayFormats: { minute:'HH:mm', hour:'HH:mm' } },
          grid: { color: '#1a2e45' }, ticks: { color: '#3a6080', font: { size: 10 } }
        },
        y: {
          grid: { color: '#1a2e45' }, ticks: { color: '#3a6080', font: { size: 10 }, callback: v => v.toFixed(2) }
        }
      },
      plugins: { legend: { display: false } },
    }
  });

  const vals = pts.map(p => p.y);
  const cur = vals[vals.length-1], min = Math.min(...vals), max = Math.max(...vals);
  const delta = cur - pts[0].y;
  const dc = delta > 0 ? 'var(--green)' : delta < 0 ? 'var(--red)' : 'var(--text)';
  document.getElementById('infoBar').innerHTML =
    '<div class="info-stat"><div class="lbl">Current</div><div class="val">'+cur.toFixed(2)+'</div></div>'
    + '<div class="info-stat"><div class="lbl">Min</div><div class="val">'+min.toFixed(2)+'</div></div>'
    + '<div class="info-stat"><div class="lbl">Max</div><div class="val">'+max.toFixed(2)+'</div></div>'
    + '<div class="info-stat"><div class="lbl">Delta</div><div class="val" style="color:'+dc+'">'+(delta>=0?'+':'')+delta.toFixed(2)+'</div></div>'
    + '<div class="info-stat"><div class="lbl">Points</div><div class="val">'+pts.length+'</div></div>';
}

// time pills
document.querySelectorAll('.time-pill').forEach(pill => {
  pill.addEventListener('click', function() {
    document.querySelectorAll('.time-pill').forEach(p => p.classList.remove('active'));
    this.classList.add('active');
    timeMins = parseInt(this.dataset.m);
    if (livePoints.length) drawChart();
  });
});

// SSE
function connectSSE() {
  if (es) es.close();
  es = new EventSource(API() + '/stream');
  es.addEventListener('message', e => {
    if (!e.data) return;
    try {
      const d = JSON.parse(e.data);
      if (d.type !== 'price') return;
      const mid = String(d.match_id);
      if (mid === selMatch && d.market === selMarket && d.odds?.[selPlayer] !== undefined) {
        const pt = { x: d.ts*1000, y: d.odds[selPlayer] };
        livePoints.push(pt);
        if (livePoints.length > 2000) livePoints = livePoints.slice(-2000);
        if (chart) {
          chart.data.datasets[0].data.push(pt);
          if (chart.data.datasets[0].data.length > 500) chart.data.datasets[0].data.shift();
          chart.update('none');
          updateInfoBar();
        }
      }
      if (d.meta) matchMeta[String(d.match_id)] = d.meta;
    } catch(_) {}
  });
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}

function updateInfoBar() {
  if (!chart) return;
  const vals = chart.data.datasets[0].data.map(p => p.y).filter(y => typeof y === 'number');
  if (!vals.length) return;
  const cur = vals[vals.length-1], min = Math.min(...vals), max = Math.max(...vals);
  const delta = cur - vals[0];
  const dc = delta > 0 ? 'var(--green)' : delta < 0 ? 'var(--red)' : 'var(--text)';
  document.getElementById('infoBar').innerHTML =
    '<div class="info-stat"><div class="lbl">Current</div><div class="val">'+cur.toFixed(2)+'</div></div>'
    + '<div class="info-stat"><div class="lbl">Min</div><div class="val">'+min.toFixed(2)+'</div></div>'
    + '<div class="info-stat"><div class="lbl">Max</div><div class="val">'+max.toFixed(2)+'</div></div>'
    + '<div class="info-stat"><div class="lbl">Delta</div><div class="val" style="color:'+dc+'">'+(delta>=0?'+':'')+delta.toFixed(2)+'</div></div>'
    + '<div class="info-stat"><div class="lbl">Points</div><div class="val">'+vals.length+'</div></div>';
}

// init
loadMatches();
setInterval(loadMatches, 30000);
</script>
</body>
</html>
