<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMU SPORT — Odds Chart</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #060a0f; --bg2: #0c1420; --bg3: #111d2e; --border: #1a2e45;
    --accent: #00d4aa; --text: #8ab4d4; --text-hi: #cde4f7; --green: #00e676; --red: #ff4f4f;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Fira Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a4060; border-radius: 3px; }

  .topbar {
    position: sticky; top: 0; z-index: 100; flex-shrink: 0;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .logo { color: var(--accent); font-weight: 700; font-size: 13px; letter-spacing: 0.07em; }
  .logo span { color: var(--text); font-weight: 400; }
  .ctrl {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 4px; font: 11px 'Fira Mono', 'Cascadia Code', 'Consolas', monospace;
    outline: none;
  }
  .ctrl:focus, .ctrl:hover { border-color: var(--accent); }

  .main-layout { flex: 1; display: flex; overflow: hidden; }
  .sidebar {
    width: 280px; flex-shrink: 0; overflow-y: auto;
    background: var(--bg2); border-right: 1px solid var(--border); padding: 10px;
  }
  .sidebar h2 { font-size: 13px; font-weight: 600; color: var(--text-hi); margin-bottom: 8px; }
  .match-item {
    padding: 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
    border-left: 2px solid transparent; transition: background .12s; margin-bottom: 2px;
  }
  .match-item:hover { background: rgba(0,212,170,.03); }
  .match-item.selected { border-left-color: var(--accent); background: rgba(0,212,170,.04); }
  .match-item .mi-name { color: var(--text-hi); font-weight: 600; }
  .match-item .mi-info { font-size: 10px; color: #3a6080; }
  .live-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; display: inline-block; margin-right: 4px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar {
    flex-shrink: 0; padding: 8px 16px; background: var(--bg2);
    border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .pill {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 4px; font: 11px 'Fira Mono', 'Cascadia Code', 'Consolas', monospace;
    cursor: pointer; transition: border-color .15s, background .12s;
  }
  .pill:hover { border-color: var(--accent); }
  .pill.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,.06); }
  .sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }

  .chart-wrap { flex: 1; padding: 10px; position: relative; min-height: 0; }
  .chart-wrap canvas { width: 100% !important; height: 100% !important; }
  .empty-state {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #3a6080; font-size: 13px; text-align: center;
  }
  .info-bar {
    flex-shrink: 0; padding: 8px 16px; background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .info-stat { font-size: 11px; }
  .info-stat .lbl { color: #3a6080; font-size: 9px; text-transform: uppercase; }
  .info-stat .val { color: var(--text-hi); font-weight: 600; }
  .info-stat .delta { font-weight: 700; }
  .err-text { color: var(--red); font-size: 11px; padding: 4px; }
  .sidebar-err { color: var(--red); font-size: 11px; padding: 8px; }

  /* ── markets panel ── */
  .match-hdr {
    flex-shrink:0; padding:8px 16px; background:var(--bg2);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .match-hdr-title { color:var(--text-hi); font-weight:700; font-size:12px; flex:1; }
  .match-hdr-ph { color:#3a6080; font-size:11px; padding:8px 16px; flex-shrink:0;
    background:var(--bg2); border-bottom:1px solid var(--border); }
  .markets-panel { flex-shrink:0; overflow-y:auto; max-height:42vh; padding:8px 12px 4px;
    border-bottom:1px solid var(--border); }
  .markets-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:6px; }
  .mkt-card { background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:6px 8px; }
  .mkt-name { font-size:9px; text-transform:uppercase; letter-spacing:.05em; color:#3a6080; margin-bottom:4px; }
  .sel-grid { display:flex; flex-wrap:wrap; gap:3px; }
  .sel-btn {
    background:var(--bg3); border:1px solid var(--border); border-radius:3px;
    padding:4px 8px; cursor:pointer; font-size:11px;
    display:flex; flex-direction:column; align-items:center; min-width:58px;
    position:relative; transition:border-color .12s;
  }
  .sel-btn:hover { border-color:var(--accent); }
  .sel-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,212,170,.07); }
  .sel-btn.suspended { opacity:0.38; }
  .sel-btn.suspended .sel-odd { text-decoration:line-through; font-size:11px; color:var(--text); }
  .sel-susp-lbl { font-size:7px; text-transform:uppercase; color:#3a6080; margin-top:1px; }
  .sel-lbl { font-size:9px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80px; }
  .sel-odd { font-size:13px; font-weight:700; color:var(--text-hi); }
  .sel-trend { position:absolute; top:2px; right:3px; font-size:9px; }
  .sel-trend.up { color:var(--green); }
  .sel-trend.down { color:var(--red); }
  .flash-up, .flash-down { position:absolute; inset:0; border-radius:3px; pointer-events:none; opacity:0; }
  .flash-up { background:rgba(0,212,170,.18); }
  .flash-down { background:rgba(255,79,79,.18); }
  .flashing-up .flash-up { animation:flash .6s ease-out; }
  .flashing-down .flash-down { animation:flash .6s ease-out; }
  @keyframes flash { 0%{opacity:1} 100%{opacity:0} }
  .mkts-empty { color:#3a6080; font-size:11px; padding:16px 4px; text-align:center; }
  .chart-section { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">PMU<span> / Odds Chart</span></div>
  <input class="ctrl" id="url" value="http://localhost:5500" placeholder="API URL" style="flex:1;min-width:200px">
  <button class="ctrl" onclick="init()" style="cursor:pointer">Reload</button>
</div>

<div class="main-layout">
  <div class="sidebar" id="sidebar">
    <h2>Matches</h2>
    <div id="sidebarStatus">Loading matches...</div>
  </div>
  <div class="main">
    <div id="matchHeader" class="match-hdr-ph">← Select a match from the sidebar</div>
    <div class="markets-panel" id="marketsPanel" style="display:none">
      <div id="marketsInner"></div>
    </div>
    <div class="chart-section">
      <div class="toolbar" id="toolbar">
        <span style="color:#3a6080;font-size:11px" id="chartCrumb">Click a selection above to view history</span>
      </div>
      <div class="chart-wrap" id="chartWrap">
        <div class="empty-state" id="placeholder">Select a match, then click a selection</div>
        <canvas id="chart" style="display:none"></canvas>
      </div>
      <div class="info-bar" id="infoBar"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const apiUrl = () => $('url').value.trim();
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let matches = {};
let livePrices = {};
let chart = null;
let es = null;

let selMatch = null;
let selMarket = '';
let selPlayer = '';
let allPoints = [];
let timeWindow = 0;
let lastLiveTs = 0;

const prevBtnOdds = {};

async function init() {
  disconnectSSE();
  resetChart();
  matches = {}; livePrices = {};
  try {
    const [mr, pr] = await Promise.all([
      fetch(apiUrl() + '/markets').then(r => r.json()),
      fetch(apiUrl() + '/prices').then(r => r.json()),
    ]);
    for (const m of (mr.matches || [])) matches[String(m.match_id)] = m;
    livePrices = pr;
    renderSidebar();
  } catch(e) {
    $('sidebarStatus').innerHTML = '<span style="color:var(--red)">Error: ' + e.message + '</span>';
  }
}

function renderSidebar() {
  const sorted = Object.entries(matches).sort((a,b) => {
    const la = a[1].state === 'STARTED' ? 0 : 1;
    const lb = b[1].state === 'STARTED' ? 0 : 1;
    return la - lb || (a[1].player_a||'').localeCompare(b[1].player_a||'');
  });
  let html = '<h2>Matches</h2>';
  for (const [mid, m] of sorted) {
    const live = m.state === 'STARTED';
    html += '<div class="match-item' + (mid===selMatch?' selected':'') + '" data-mid="' + mid + '">'
      + '<div class="mi-name">' + (live?'<span class="live-dot"></span>':'')
      + esc(m.player_a||'?') + ' vs ' + esc(m.player_b||'?') + '</div>'
      + '<div class="mi-info">' + esc(m.competition||'') + ' · '
      + (m.start_time ? new Date(m.start_time).toLocaleDateString() : 'TBD') + '</div>'
      + '</div>';
  }
  $('sidebar').innerHTML = html + '<div id="sidebarStatus" style="display:none"></div>';
  $('sidebar').querySelectorAll('.match-item').forEach(el =>
    el.addEventListener('click', () => selectMatch(el.dataset.mid))
  );
}

function selectMatch(mid) {
  selMatch = mid; selMarket = ''; selPlayer = '';
  allPoints = []; lastLiveTs = 0;
  resetChart();
  renderSidebar();

  const m = matches[mid] || {};
  const live = m.state === 'STARTED';
  const name = esc((m.player_a||'?') + ' vs ' + (m.player_b||'?'));
  $('matchHeader').className = 'match-hdr';
  $('matchHeader').innerHTML = '<span class="match-hdr-title">' + name + '</span>'
    + (live ? '<span style="background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px">LIVE</span>' : '')
    + (m.competition ? '<span style="font-size:10px;color:#3a6080">' + esc(m.competition) + '</span>' : '');

  $('marketsPanel').style.display = '';
  $('marketsInner').innerHTML = '<div class="mkts-empty">Loading markets…</div>';

  fetch(apiUrl() + '/match-markets/' + mid)
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      if (!livePrices[mid]) livePrices[mid] = {};
      for (const [mkt, sels] of Object.entries(data.markets || {})) {
        if (!livePrices[mid][mkt]) livePrices[mid][mkt] = {};
        Object.assign(livePrices[mid][mkt], sels);
      }
      if (selMatch === mid) renderMarketsGrid(mid);
    })
    .catch(() => { if (selMatch === mid) renderMarketsGrid(mid); });

  connectSSE();
}

function renderMarketsGrid(mid) {
  const mkts = livePrices[mid] || {};
  const mktKeys = Object.keys(mkts);
  if (!mktKeys.length) {
    $('marketsInner').innerHTML = '<div class="mkts-empty">No market data yet</div>';
    return;
  }
  let html = '<div class="markets-grid">';
  for (const mkt of mktKeys) {
    const sels = mkts[mkt] || {};
    const selEntries = Object.entries(sels);
    if (!selEntries.length) continue;
    const btns = selEntries.map(([sel, odd]) => {
      const isSusp = odd == null;
      const isActive = selMarket === mkt && selPlayer === sel;
      const oddStr = isSusp ? '—' : odd.toFixed(2);
      return '<div class="sel-btn' + (isActive?' active':'') + (isSusp?' suspended':'') + '" data-mkt="' + esc(mkt) + '" data-sel="' + esc(sel) + '">'
        + '<div class="flash-up"></div><div class="flash-down"></div>'
        + '<div class="sel-lbl">' + esc(sel.length>13?sel.slice(0,11)+'…':sel) + '</div>'
        + '<div class="sel-odd">' + oddStr + '</div>'
        + (isSusp ? '<div class="sel-susp-lbl">susp</div>' : '<span class="sel-trend"></span>')
        + '</div>';
    }).join('');
    html += '<div class="mkt-card"><div class="mkt-name">' + esc(mkt) + '</div><div class="sel-grid">' + btns + '</div></div>';
  }
  html += '</div>';
  $('marketsInner').innerHTML = html;
  $('marketsInner').querySelectorAll('.sel-btn').forEach(el =>
    el.addEventListener('click', () => pickSelection(el.dataset.mkt, el.dataset.sel, el))
  );
}

function pickSelection(mkt, sel, el) {
  $('marketsInner').querySelectorAll('.sel-btn.active').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selMarket = mkt; selPlayer = sel;
  allPoints = []; lastLiveTs = 0;
  resetChart();
  buildToolbar();
  fetchHistory();
}

function buildToolbar() {
  const crumb = selPlayer
    ? '<b style="color:var(--text-hi)">' + esc(selPlayer) + '</b> <span style="color:#3a6080">·</span> ' + esc(selMarket)
    : '<span style="color:#3a6080">Click a selection above</span>';
  let html = '<span style="flex:1;font-size:11px">' + crumb + '</span>';
  [[5,'5m'],[15,'15m'],[60,'1h'],[360,'6h'],[0,'All']].forEach(([t,l]) => {
    html += '<button class="pill' + (timeWindow===t?' active':'') + '" data-t="' + t + '">' + l + '</button>';
  });
  $('toolbar').innerHTML = html;
  $('toolbar').querySelectorAll('[data-t]').forEach(el =>
    el.addEventListener('click', () => { timeWindow = parseInt(el.dataset.t); buildToolbar(); drawChart(); })
  );
}

async function fetchHistory() {
  if (!selMatch || !selPlayer) return;
  $('placeholder').textContent = 'Loading…';
  $('placeholder').style.display = '';
  $('chart').style.display = 'none';
  try {
    const r = await fetch(apiUrl() + '/history'
      + '?match_id=' + selMatch
      + '&selection=' + encodeURIComponent(selPlayer)
      + '&market=' + encodeURIComponent(selMarket)
      + '&limit=2000');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    allPoints = (data.points || []).map(p => ({ x: p.ts*1000, y: p.odd }));
    const cur = livePrices[selMatch]?.[selMarket]?.[selPlayer];
    if (cur != null) {
      const last = allPoints.length ? allPoints[allPoints.length-1].x/1000 : 0;
      if (Date.now()/1000 - last > 2) allPoints.push({ x: Date.now(), y: cur });
    }
    lastLiveTs = allPoints.length ? allPoints[allPoints.length-1].x : 0;
    drawChart();
  } catch(e) {
    $('placeholder').textContent = 'Error: ' + e.message;
  }
}

function resetChart() {
  if (chart) { chart.destroy(); chart = null; }
  $('chart').style.display = 'none';
  $('placeholder').style.display = '';
  $('placeholder').textContent = 'Select a match, then click a selection';
  $('infoBar').innerHTML = '';
  buildToolbar();
}

function drawChart() {
  if (chart) { chart.destroy(); chart = null; }
  let pts = [...allPoints];
  if (timeWindow > 0) {
    const cut = Date.now() - timeWindow*60000;
    const before = pts.filter(p => p.x < cut);
    pts = pts.filter(p => p.x >= cut);
    if (before.length && pts.length) pts = [before[before.length-1], ...pts];
  }
  if (!pts.length) {
    $('placeholder').textContent = 'No data for this selection';
    $('placeholder').style.display = '';
    return;
  }
  $('chart').style.display = '';
  $('placeholder').style.display = 'none';
  const ctx = $('chart').getContext('2d');
  const _yv = pts.map(p=>p.y), _ymn=Math.min(..._yv), _ymx=Math.max(..._yv);
  const _ypad = Math.max(0.02, (_ymx-_ymn)*0.1) || 0.05;
  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets: [{ label: selPlayer + ' — ' + selMarket, data: pts,
        borderColor: '#00d4aa', backgroundColor: 'rgba(0,212,170,0.08)',
        borderWidth: 1.5, pointRadius: pts.length>300?0:2, pointHoverRadius:4, fill:true, tension:0.05 }] },
    options: {
      responsive:true, maintainAspectRatio:false, animation:false,
      interaction:{ intersect:false, mode:'nearest' },
      scales: {
        x: { type:'time', time:{ unit:timeWindow<=15?'minute':timeWindow<=360?'hour':'day',
              displayFormats:{minute:'HH:mm',hour:'HH:mm',day:'MMM d'} },
             grid:{color:'#1a2e45'}, ticks:{color:'#3a6080',font:{size:10},maxTicksLimit:12} },
        y: { min:_ymn-_ypad, max:_ymx+_ypad, grid:{color:'#1a2e45'}, ticks:{color:'#3a6080',font:{size:10},callback:v=>v.toFixed(2)} }
      },
      plugins: {
        legend:{display:false},
        tooltip:{ backgroundColor:'#0c1420', borderColor:'#1a2e45', borderWidth:1,
          titleColor:'#8ab4d4', bodyColor:'#cde4f7',
          titleFont:{family:'Fira Mono',size:11}, bodyFont:{family:'Fira Mono',size:13},
          callbacks:{label:ctx=>ctx.parsed.y.toFixed(2)} }
      }
    }
  });
  updateInfoBar(pts);
}

function updateInfoBar(pts) {
  if (!pts?.length) return;
  const vals = pts.map(p=>p.y);
  const cur=vals[vals.length-1], min=Math.min(...vals), max=Math.max(...vals);
  const delta=cur-vals[0];
  const col=delta>0?'var(--green)':delta<0?'var(--red)':'var(--text)';
  $('infoBar').innerHTML =
    st('Current',cur.toFixed(2)) + st('Min',min.toFixed(2)) + st('Max',max.toFixed(2)) +
    st('Δ',(delta>=0?'+':'')+delta.toFixed(2),col) + st('Points',pts.length) +
    (allPoints.length!==pts.length?st('Total',allPoints.length):'');
}
function st(l,v,col='') {
  return '<div class="info-stat"><div class="lbl">'+l+'</div><div class="val"'+(col?' style="color:'+col+'"':'')+'>'+v+'</div></div>';
}

function pushLivePoint(ts, odd) {
  const x = ts*1000;
  if (x <= lastLiveTs) return;
  allPoints.push({x,y:odd}); lastLiveTs=x;
  if (allPoints.length>5000) allPoints=allPoints.slice(-5000);
  if (!chart) return;
  const ds=chart.data.datasets[0].data;
  ds.push({x,y:odd});
  if (timeWindow>0) { const cut=Date.now()-timeWindow*60000; while(ds.length>1&&ds[0].x<cut) ds.shift(); }
  if (ds.length>1000) ds.shift();
  chart.update('none');
  updateInfoBar(ds);
}

function flashBtn(btn, dir) {
  btn.classList.remove('flashing-up','flashing-down');
  void btn.offsetWidth;
  btn.classList.add(dir==='up'?'flashing-up':'flashing-down');
  setTimeout(()=>btn.classList.remove('flashing-up','flashing-down'),700);
}

function patchMarketsGrid(mid, mkt, oddsObj) {
  if (mid !== selMatch) return;
  const inner = $('marketsInner');
  if (!inner) return;
  for (const [sel, odd] of Object.entries(oddsObj)) {
    const btn = inner.querySelector('.sel-btn[data-mkt="' + CSS.escape(mkt) + '"][data-sel="' + CSS.escape(sel) + '"]');
    if (!btn) { renderMarketsGrid(mid); return; }
    const isSusp = odd == null;
    const wasSusp = btn.classList.contains('suspended');
    btn.classList.toggle('suspended', isSusp);
    const k = mid+'|'+mkt+'|'+sel;
    const prev = prevBtnOdds[k];
    prevBtnOdds[k] = odd;
    const oddEl = btn.querySelector('.sel-odd');
    if (oddEl) { oddEl.textContent = isSusp ? '—' : odd.toFixed(2); oddEl.style.textDecoration = isSusp?'line-through':''; }
    let suspLbl = btn.querySelector('.sel-susp-lbl');
    let trendEl = btn.querySelector('.sel-trend');
    if (isSusp && !suspLbl) { if(trendEl)trendEl.remove(); btn.insertAdjacentHTML('beforeend','<div class="sel-susp-lbl">susp</div>'); }
    else if (!isSusp && suspLbl) { suspLbl.remove(); btn.insertAdjacentHTML('beforeend','<span class="sel-trend"></span>'); trendEl=btn.querySelector('.sel-trend'); }
    if (!isSusp && wasSusp) { flashBtn(btn,'up'); }
    else if (!isSusp && !wasSusp && trendEl) {
      const dir = prev===undefined?null:odd>prev+0.001?'up':odd<prev-0.001?'down':null;
      trendEl.className='sel-trend'+(dir?' '+dir:'');
      trendEl.textContent=dir==='up'?'▲':dir==='down'?'▼':'';
      if(dir) flashBtn(btn,dir);
    }
  }
}

function connectSSE() {
  disconnectSSE();
  es = new EventSource(apiUrl() + '/stream');
  es.addEventListener('snapshot', e => {
    try {
      const d = JSON.parse(e.data);
      if (d.prices) {
        for (const [mid, mkts] of Object.entries(d.prices)) {
          if (!livePrices[mid]) livePrices[mid] = {};
          for (const [m, sels] of Object.entries(mkts))
            livePrices[mid][m] = Object.assign(livePrices[mid][m]||{}, sels);
        }
      }
      if (selMatch) renderMarketsGrid(selMatch);
    } catch(_) {}
  });
  es.addEventListener('message', e => {
    if (!e.data) return;
    try {
      const d = JSON.parse(e.data);
      if (d.type !== 'price') return;
      const mid = String(d.match_id);
      if (!livePrices[mid]) livePrices[mid] = {};
      if (!livePrices[mid][d.market]) livePrices[mid][d.market] = {};
      Object.assign(livePrices[mid][d.market], d.odds);
      if (d.meta) matches[mid] = d.meta;
      if (mid === selMatch) patchMarketsGrid(mid, d.market, d.odds);
      if (mid===selMatch && d.market===selMarket && d.odds?.[selPlayer]!=null) pushLivePoint(d.ts, d.odds[selPlayer]);
    } catch(_) {}
  });
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}

function disconnectSSE() { if (es) { es.close(); es=null; } }

buildToolbar();
init().then(() => {
  const mid = new URLSearchParams(location.search).get('match_id');
