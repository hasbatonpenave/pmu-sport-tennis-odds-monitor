<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMU Sport — Journal SSE</title>
<link href="https://fonts.googleapis.com/css2?family=Marianne:ital,wght@0,400;0,700;1,400&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue-france: #000091;
  --red-marianne: #c9191e;
  --text-main: #161616;
  --text-mention: #666666;
  --bg-default: #ffffff;
  --bg-alt: #f6f6f6;
  --border-default: #e5e5e5;
  --success: #1f8d49;
  --warning: #d64d00;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-default); color: var(--text-main);
  font-family: 'Marianne', Arial, sans-serif; font-size: 14px; line-height: 1.5;
  min-height: 100vh; display: flex; flex-direction: column;
}
.gov-header {
  border-bottom: 2px solid var(--blue-france);
  background: var(--bg-default); padding: 12px 24px; flex-shrink: 0;
}
.gov-brand-container { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
.marianne-logo {
  border-left: 3px solid var(--text-main); padding-left: 8px;
  font-weight: 700; text-transform: uppercase; font-size: 11px;
  letter-spacing: 0.05em; line-height: 1.1;
}
.marianne-logo span { color: var(--red-marianne); }
.app-title-area { flex: 1; padding-left: 16px; }
.app-title-area h1 { font-size: 16px; font-weight: 700; color: var(--blue-france); }
.app-title-area p { font-size: 11px; color: var(--text-mention); }
.api-config {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-alt); padding: 6px 10px; border: 1px solid var(--border-default);
}
.gov-input {
  background: var(--bg-default); color: var(--text-main); border: 1px solid #858585;
  padding: 5px 10px; font-family: 'Roboto Mono', monospace; font-size: 12px; outline: none;
}
.gov-input:focus { outline: 2px solid var(--blue-france); }
.gov-btn {
  background: var(--blue-france); color: #fff; border: none; padding: 5px 12px;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Marianne', Arial, sans-serif;
}
.gov-btn:hover { background: #1b1bbf; }
.gov-btn.alt { background: transparent; color: var(--blue-france); border: 1px solid var(--blue-france); }
.gov-btn.alt:hover { background: rgba(0,0,145,0.05); }
.gov-tabs {
  background: var(--bg-alt); display: flex;
  border-bottom: 1px solid var(--border-default); padding: 0 24px; flex-shrink: 0;
}
.tab-btn {
  background: transparent; border: none; color: var(--text-main);
  padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
  border-bottom: 3px solid transparent; text-decoration: none; display: inline-block;
  font-family: 'Marianne', Arial, sans-serif;
}
.tab-btn:hover { background: rgba(0,0,145,0.05); }
.tab-btn.active { border-bottom-color: var(--blue-france); color: var(--blue-france); }
.status-bar {
  background: #eeeeee; padding: 6px 24px; font-size: 12px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border-default); flex-shrink: 0;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.live { background: var(--success); }
.dot.err  { background: var(--red-marianne); }
.dot.off  { background: #858585; }
.toolbar {
  display: flex; gap: 8px; align-items: center; padding: 10px 24px;
  background: var(--bg-alt); border-bottom: 1px solid var(--border-default);
  flex-wrap: wrap; flex-shrink: 0;
}
.gov-select {
  background: var(--bg-default); color: var(--text-main); border: 1px solid #858585;
  padding: 5px 10px; font-family: 'Marianne', Arial, sans-serif; font-size: 12px; outline: none; cursor: pointer;
}
.gov-select:focus { outline: 2px solid var(--blue-france); }
.counter { font-size: 12px; color: var(--text-mention); margin-left: auto; white-space: nowrap; }
.log-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 16px 24px; }
.log {
  flex: 1; overflow-y: auto;
  background: #1e1e1e; color: #f4f4f4;
  font-family: 'Roboto Mono', monospace; font-size: 12px;
  padding: 12px; border-radius: 2px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
}
.log-row {
  display: flex; gap: 8px; padding: 3px 0; border-bottom: 1px solid #2d2d2d;
  font-size: 11px; line-height: 1.5; align-items: baseline;
}
.log-row:hover { background: rgba(255,255,255,0.03); }
.log-row .ts   { color: #858585; white-space: nowrap; min-width: 70px; }
.log-row .badge {
  font-size: 9px; padding: 1px 5px; font-weight: 700; white-space: nowrap; flex-shrink: 0; border: 1px solid;
}
.log-row .badge.price { color: #00cbc6; border-color: rgba(0,203,198,.4); }
.log-row .badge.snap  { color: #69db7c; border-color: rgba(105,219,124,.4); }
.log-row .body { flex: 1; word-break: break-all; color: #f4f4f4; }
.log-row.live { background: rgba(31,141,73,.05); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
</style>
</head>
<body>

<header class="gov-header">
  <div class="gov-brand-container">
    <div class="marianne-logo">République<br>Française<br><span>——</span></div>
    <div class="app-title-area">
      <h1>PMU Sport — Journal d'Audit SSE</h1>
      <p>Flux d'événements en temps réel</p>
    </div>
    <div class="api-config">
      <label style="font-size:12px;font-weight:700;white-space:nowrap;">Serveur :</label>
      <input class="gov-input" id="url" value="http://localhost:5500" placeholder="URL du serveur" style="flex:1;min-width:200px">
      <button class="gov-btn" id="connectBtn" onclick="connect()">Connecter</button>
    </div>
  </div>
</header>

<nav class="gov-tabs">
  <a class="tab-btn" href="dashboard.html">Vue d'ensemble</a>
  <a class="tab-btn" href="chart.html">Graphique</a>
  <a class="tab-btn active" href="stream.html">Journal SSE</a>
</nav>

<div class="status-bar">
  <div class="dot off" id="dot"></div>
  <span class="status-txt" id="statusTxt">connexion...</span>
  <span class="counter" id="counter">0 événements · 0/s</span>
</div>

<div class="toolbar">
  <button class="gov-btn" id="pauseBtn" onclick="togglePause()">Pause</button>
  <button class="gov-btn alt" onclick="clearLog()">Purger</button>
  <select class="gov-select" id="typeFilter" onchange="applyTypeFilter()">
    <option value="all">Tous les événements</option>
    <option value="price">Prix seulement</option>
    <option value="snapshot">Snapshot seulement</option>
  </select>
</div>

<div class="log-wrap">
  <div class="log" id="log"></div>
</div>

<script>
const API = () => document.getElementById('url').value.trim();
let es = null, paused = false, pending = [];
let totalEvents = 0, epsCount = 0;
const MAX_ROWS = 600;

function $(id) { return document.getElementById(id); }

function setStatus(ok) {
  const d = $('dot'), t = $('statusTxt');
  d.className = 'dot ' + (ok ? 'live' : 'err');
  t.textContent = ok ? 'Connecté' : 'Déconnecté';
}

function togglePause() {
  paused = !paused;
  const btn = $('pauseBtn');
  btn.textContent = paused ? 'Reprendre' : 'Pause';
  if (!paused && pending.length) {
    const queue = pending.splice(0);
    queue.forEach(e => appendRow(e.type, e.data));
  }
}

function clearLog() { $('log').innerHTML = ''; totalEvents = 0; }

function appendRow(type, data) {
  totalEvents++; epsCount++;
  const now = new Date();
  const ts = now.toLocaleTimeString('fr-FR');
  const badge = type === 'snapshot' ? 'SNAP' : 'PRICE';
  const badgeCls = type === 'snapshot' ? 'snap' : 'price';
  let body = '';
  if (type === 'snapshot') {
    const count = Object.keys(data?.prices||{}).length;
    body = 'Snapshot (' + count + ' matchs)';
  } else {
    const name = data?.meta?.player_a + ' vs ' + data?.meta?.player_b || 'Match ' + (data?.match_id||'');
    const odds = data?.odds ? Object.entries(data.odds).map(([k,v])=>k+':<b>'+v.toFixed(2)+'</b>').join(' ') : '';
    body = '<b>' + name + '</b> [' + (data?.market||'') + '] ' + odds + (data?.live ? ' DIRECT' : '');
  }
  const isLive = data?.live || data?.meta?.state === 'STARTED';
  const row = document.createElement('div');
  row.className = 'log-row' + (isLive ? ' live' : '');
  row.dataset.type = type;
  row.innerHTML = '<span class="ts">' + ts + '</span>'
    + '<span class="badge ' + badgeCls + '">' + badge + '</span>'
    + '<span class="body">' + body + '</span>';
  const log = $('log');
  log.insertBefore(row, log.firstChild);
  while (log.children.length > MAX_ROWS) log.lastChild?.remove();
}

function applyTypeFilter() {
  const f = $('typeFilter').value;
  document.querySelectorAll('.log-row').forEach(r => {
    r.style.display = (f === 'all' || r.dataset.type === f) ? '' : 'none';
  });
}

function connect() {
  if (es) { es.close(); es = null; }
  setStatus(false);
  pending = []; totalEvents = 0; epsCount = 0;
  $('dot').className = 'dot off'; $('statusTxt').textContent = 'connexion...';
  es = new EventSource(API() + '/stream');
  es.addEventListener('snapshot', e => {
    try {
      const d = JSON.parse(e.data);
      if (paused) pending.push({ type: 'snapshot', data: d });
      else appendRow('snapshot', d);
      setStatus(true);
    } catch(_) {}
  });
  es.addEventListener('message', e => {
    if (!e.data) return;
    try {
      const d = JSON.parse(e.data);
      if (paused) pending.push({ type: 'price', data: d });
      else appendRow('price', d);
      setStatus(true);
    } catch(_) {}
  });
  es.onerror = () => { es.close(); setStatus(false); setTimeout(connect, 5000); };
}

setInterval(() => { $('counter').textContent = totalEvents + ' événements · ' + epsCount + '/s'; epsCount = 0; }, 1000);

connect();
</script>
</body>
</html>
