<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMU SPORT — SSE Log</title>
<style>
  :root {
    --bg:#060a0f; --bg2:#0c1420; --bg3:#111d2e; --border:#1a2e45;
    --accent:#00d4aa; --blue:#0096ff; --text:#8ab4d4; --text-hi:#cde4f7; --green:#00e676; --red:#ff4f4f;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Fira Mono','Cascadia Code','Consolas',monospace;
    font-size:11px; min-height:100vh;
    display:flex; flex-direction:column;
  }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#2a4060; border-radius:3px; }

  .topbar {
    position:sticky; top:0; z-index:100; flex-shrink:0;
    background:var(--bg2); border-bottom:1px solid var(--border);
    padding:8px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .logo { color:var(--accent); font-weight:700; font-size:13px; letter-spacing:0.07em; }
  .logo span { color:var(--text); font-weight:400; }
  .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .dot.live { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
  .dot.err  { background:var(--red); }
  .dot.off  { background:#3a6080; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .status-txt { font-size:10px; }
  .ctrl {
    background:var(--bg3); color:var(--text); border:1px solid var(--border);
    padding:4px 8px; border-radius:4px; font:10px 'Fira Mono','Cascadia Code','Consolas',monospace;
    outline:none; cursor:pointer;
  }
  .ctrl:focus, .ctrl:hover { border-color:var(--accent); }
  .ctrl.active { border-color:var(--accent); color:var(--accent); background:rgba(0,212,170,.06); }
  .counter { font-size:10px; color:var(--text); margin-left:auto; white-space:nowrap; }

  .log {
    flex:1; overflow-y:auto; padding:6px 10px;
  }
  .log-row {
    display:flex; gap:8px; padding:4px 6px; border-bottom:1px solid rgba(26,46,69,.5);
    font-size:10px; line-height:1.5; align-items:baseline;
  }
  .log-row:hover { background:rgba(0,212,170,.03); }
  .log-row .ts { color:#2a4060; white-space:nowrap; min-width:70px; }
  .log-row .badge {
    font-size:9px; padding:1px 5px; border-radius:3px; font-weight:700; white-space:nowrap; flex-shrink:0;
    border:1px solid;
  }
  .log-row .badge.price { color:var(--accent); border-color:var(--accent); }
  .log-row .badge.snap { color:var(--blue); border-color:var(--blue); }
  .log-row .body { flex:1; word-break:break-all; color:var(--text); }
  .log-row.live { background:rgba(0,230,118,.02); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">PMU<span> / SSE Log</span></div>
  <div class="dot off" id="dot"></div>
  <span class="status-txt" id="statusTxt">connecting...</span>
  <input class="ctrl" id="url" value="http://localhost:5500" placeholder="API URL" style="flex:1;min-width:200px">
  <button class="ctrl" id="connectBtn" onclick="connect()">Connect</button>
  <button class="ctrl" id="pauseBtn" onclick="togglePause()">Pause</button>
  <button class="ctrl" onclick="clearLog()">Clear</button>
  <select class="ctrl" id="typeFilter" onchange="applyTypeFilter()">
    <option value="all">All events</option>
    <option value="price">Price only</option>
    <option value="snapshot">Snapshot only</option>
  </select>
  <span class="counter" id="counter">0 events · 0/s</span>
</div>

<div class="log" id="log"></div>

<script>
const API = () => document.getElementById('url').value.trim();
let es = null, paused = false, pending = [];
let totalEvents = 0, epsCount = 0;
const MAX_ROWS = 600;

function $(id) { return document.getElementById(id); }

function setStatus(ok) {
  const d = $('dot'), t = $('statusTxt');
  d.className = 'dot ' + (ok ? 'live' : 'err');
  t.textContent = ok ? 'Connected' : 'Disconnected';
}

function togglePause() {
  paused = !paused;
  const btn = $('pauseBtn');
  btn.textContent = paused ? 'Resume' : 'Pause';
  btn.classList.toggle('active', paused);
  if (!paused && pending.length) {
    const queue = pending.splice(0);
    queue.forEach(e => appendRow(e.type, e.data));
  }
}

function clearLog() { $('log').innerHTML = ''; totalEvents = 0; }

function appendRow(type, data) {
  totalEvents++; epsCount++;
  const now = new Date();
  const ts = now.toLocaleTimeString();
  const badge = type === 'snapshot' ? 'SNAP' : 'PRICE';
  const badgeCls = type === 'snapshot' ? 'snap' : 'price';

  let body = '';
  if (type === 'snapshot') {
    const count = Object.keys(data?.prices||{}).length;
    body = 'Snapshot (' + count + ' matches)';
  } else {
    const name = data?.meta?.player_a + ' vs ' + data?.meta?.player_b || 'Match ' + (data?.match_id||'');
    const odds = data?.odds ? Object.entries(data.odds).map(([k,v])=>k+':<b>'+v.toFixed(2)+'</b>').join(' ') : '';
    body = '<b>' + name + '</b> [' + (data?.market||'') + '] ' + odds + (data?.live ? ' LIVE' : '');
  }

  const isLive = data?.live || data?.meta?.state === 'STARTED';
  const row = document.createElement('div');
  row.className = 'log-row' + (isLive ? ' live' : '');
  row.dataset.type = type;
  row.innerHTML = '<span class="ts">' + ts + '</span>'
    + '<span class="badge ' + badgeCls + '">' + badge + '</span>'
    + '<span class="body">' + body + '</span>';

  const log = $('log');
  log.insertBefore(row, log.firstChild);
  while (log.children.length > MAX_ROWS) log.lastChild?.remove();
}

function applyTypeFilter() {
  const f = $('typeFilter').value;
  document.querySelectorAll('.log-row').forEach(r => {
    r.style.display = (f === 'all' || r.dataset.type === f) ? '' : 'none';
  });
}

function connect() {
  if (es) { es.close(); es = null; }
  setStatus(false);
  pending = []; totalEvents = 0; epsCount = 0;
  $('dot').className = 'dot off'; $('statusTxt').textContent = 'connecting...';

  es = new EventSource(API() + '/stream');
  es.addEventListener('snapshot', e => {
    try {
      const d = JSON.parse(e.data);
      if (paused) pending.push({ type: 'snapshot', data: d });
      else appendRow('snapshot', d);
      setStatus(true);
    } catch(_) {}
  });
  es.addEventListener('message', e => {
    if (!e.data) return;
    try {
      const d = JSON.parse(e.data);
      if (paused) pending.push({ type: 'price', data: d });
      else appendRow('price', d);
      setStatus(true);
    } catch(_) {}
  });
  es.onerror = () => { es.close(); setStatus(false); setTimeout(connect, 5000); };
}

// eps counter
setInterval(() => { $('counter').textContent = totalEvents + ' events · ' + epsCount + '/s'; epsCount = 0; }, 1000);

connect();
</script>
</body>
</html>
